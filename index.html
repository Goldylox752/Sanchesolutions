<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sanche Solutions | AI Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:#f9f8f6;
  --text:#1a1a1a;
  --muted:#888;
  --border:#e8e5e0;
  --accent:#1a1a1a;
  --user:#1a1a1a;
  --userText:#fff;
  --bot:#f1efe9;
}

body {
  background:var(--bg);
  font-family:Geist,sans-serif;
  min-height:100vh;
}

/* FAB */
.fab {
  position:fixed;
  bottom:24px;
  right:24px;
  width:56px;
  height:56px;
  border-radius:50%;
  background:var(--accent);
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

/* PANEL */
.panel {
  position:fixed;
  bottom:90px;
  right:24px;
  width:360px;
  height:520px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:16px;
  display:flex;
  flex-direction:column;
  opacity:0;
  transform:translateY(10px);
  pointer-events:none;
  transition:.2s;
  overflow:hidden;
}

.panel.open {
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

/* HEADER */
.header {
  padding:14px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title {
  font-family:"Instrument Serif";
}

/* CHAT */
.messages {
  flex:1;
  padding:12px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg {
  max-width:80%;
  padding:10px 12px;
  border-radius:12px;
  font-size:13px;
}

.user {
  background:var(--user);
  color:var(--userText);
  margin-left:auto;
}

.bot {
  background:var(--bot);
}

/* INPUT */
.input {
  display:flex;
  border-top:1px solid var(--border);
  padding:10px;
}

textarea {
  flex:1;
  resize:none;
  border:none;
  outline:none;
  background:var(--bot);
  padding:10px;
  border-radius:10px;
}

button.send {
  margin-left:8px;
  width:40px;
  border:none;
  background:var(--accent);
  color:#fff;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<button class="fab" id="fab">💬</button>

<div class="panel" id="panel">

  <div class="header">
    <div class="title">Sanche AI</div>
    <button id="close">✕</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <textarea id="input" placeholder="Ask something..."></textarea>
    <button class="send" id="send">➤</button>
  </div>

</div>

<script>
/* ✅ FIXED BACKEND CONNECTION */
const API_URL = "https://sanchesolutions.onrender.com/api/bot";

const fab = document.getElementById("fab");
const panel = document.getElementById("panel");
const closeBtn = document.getElementById("close");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const messages = document.getElementById("messages");

fab.onclick = () => panel.classList.toggle("open");
closeBtn.onclick = () => panel.classList.remove("open");

function add(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  add(text, "user");
  input.value = "";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    add(data.reply || "No response", "bot");

  } catch (err) {
    add("Error connecting to server.", "bot");
  }
}

sendBtn.onclick = sendMessage;

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>

</body>
</html>
