<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sanche Solutions | AI Systems That Convert</title>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg1:#050505;
  --bg2:#0b0f1a;
  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.10);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.65);
}

/* background */
body {
  font-family: Geist, sans-serif;
  color: var(--text);
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 20%, #1a2a6c33, transparent 40%),
    radial-gradient(circle at 80% 30%, #b21f1f22, transparent 40%),
    radial-gradient(circle at 50% 80%, #0f202733, transparent 40%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:22px 40px;
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.4);
  border-bottom:1px solid var(--border);
}

/* HERO */
.hero {
  text-align:center;
  padding:140px 20px 80px;
}

.hero h1 {
  font-family:"Instrument Serif";
  font-size:64px;
}

.hero p {
  color:var(--muted);
  margin-top:20px;
  font-size:18px;
}

/* CTA */
.cta {
  margin-top:30px;
  display:inline-block;
  padding:14px 26px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--card);
  cursor:pointer;
}

/* CHAT */
.fab {
  position:fixed;
  bottom:24px;
  right:24px;
  width:58px;
  height:58px;
  border-radius:50%;
  background:white;
  color:black;
  border:none;
  cursor:pointer;
  font-size:20px;
  z-index:9999;
}

.panel {
  position:fixed;
  bottom:90px;
  right:24px;
  width:380px;
  height:520px;
  background:rgba(10,10,10,0.95);
  border:1px solid var(--border);
  border-radius:18px;
  display:flex;
  flex-direction:column;
  opacity:0;
  transform:translateY(10px);
  pointer-events:none;
  transition:.25s;
}

.panel.open {
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

/* HEADER */
.header {
  padding:12px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
}

/* MESSAGES */
.messages {
  flex:1;
  padding:12px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg {
  max-width:85%;
  padding:10px 12px;
  border-radius:12px;
  font-size:13px;
}

.user {
  background:white;
  color:black;
  margin-left:auto;
}

.bot {
  background:rgba(255,255,255,0.08);
  color:white;
}

/* INPUT */
.input {
  display:flex;
  border-top:1px solid var(--border);
  padding:10px;
  gap:8px;
}

input {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
}

button.send {
  width:42px;
  background:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <div>Sanche Solutions</div>
</nav>

<section class="hero">
  <h1>AI Systems That Sell While You Sleep</h1>
  <p>High converting websites + automation + AI chat systems.</p>
  <div class="cta" onclick="toggleChat()">Start Chat</div>
</section>

<!-- CHAT -->
<button class="fab" onclick="toggleChat()">💬</button>

<div class="panel" id="panel">
  <div class="header">
    <div>Sanche AI</div>
    <button onclick="toggleChat()">✕</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="input" placeholder="Type your message..." />
    <button class="send" onclick="send()">➤</button>
  </div>
</div>

<script>
const API_URL = "https://sanchesolutions.onrender.com/api/bot";

const panel = document.getElementById("panel");
const messages = document.getElementById("messages");
const input = document.getElementById("input");

function toggleChat() {
  panel.classList.toggle("open");

  if (messages.children.length === 0) {
    add("Hey 👋 How can I help you today?", "bot");
  }
}

function add(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  add(text, "user");
  input.value = "";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    add(data.reply || "No response", "bot");

  } catch (err) {
    add("Server not responding. Check backend.", "bot");
  }
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
