<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Sanche AI | AI Systems That Generate Leads & Close Sales</title>

<meta name="description" content="We build AI automation systems that generate leads, qualify prospects, and close sales automatically for service businesses."/>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#050814;
  --card:rgba(255,255,255,0.04);
  --border:rgba(120,160,255,0.18);
  --text:#eef3ff;
  --muted:rgba(210,220,255,0.65);
  --blue:#4f8cff;
  --blue2:#7aa8ff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:"DM Sans",sans-serif;
  background:
    radial-gradient(circle at 20% 10%, rgba(79,140,255,0.18), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(122,168,255,0.12), transparent 40%),
    var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 28px;
  background:rgba(5,8,20,0.6);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}

.logo{font-weight:600;}
.logo span{color:var(--blue);}

.btn{
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  border:none;
  padding:12px 18px;
  border-radius:12px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:120px 20px 60px;
}

.badge{
  padding:6px 12px;
  border:1px solid var(--border);
  border-radius:999px;
  color:var(--blue2);
  font-size:12px;
}

h1{
  font-size:58px;
  max-width:900px;
  line-height:1.05;
  margin-top:20px;
}

h1 span{
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p{
  margin-top:18px;
  max-width:720px;
  color:var(--muted);
  font-size:18px;
  line-height:1.6;
}

/* STATS */
.strip{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:40px;
  max-width:900px;
}

.strip div{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  padding:18px;
  border-radius:16px;
}

.strip h3{color:var(--blue);}

/* SECTIONS */
.section{
  max-width:1100px;
  margin:auto;
  padding:80px 20px;
}

.title{font-size:44px;}
.sub{color:var(--muted);margin-top:10px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;
  margin-top:40px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  padding:24px;
  border-radius:18px;
}

/* PRICING */
.pricing{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;
  margin-top:40px;
}

.price{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  padding:26px;
  border-radius:18px;
}

.price h2{color:var(--blue);}

/* CTA */
.cta{
  text-align:center;
  padding:70px 20px;
  background:linear-gradient(135deg,rgba(79,140,255,0.12),rgba(122,168,255,0.06));
  border:1px solid var(--border);
  border-radius:28px;
  max-width:900px;
  margin:80px auto;
}

/* CHAT */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:58px;
  height:58px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  color:white;
  cursor:pointer;
}

.panel{
  position:fixed;
  bottom:90px;
  right:20px;
  width:360px;
  height:540px;
  background:rgba(10,14,30,0.95);
  border:1px solid var(--border);
  border-radius:18px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  opacity:0;
  transform:translateY(20px);
  pointer-events:none;
  transition:.25s;
}

.panel.open{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.header{
  padding:14px;
  border-bottom:1px solid var(--border);
  font-weight:600;
}

.messages{
  flex
