<script>
/* =========================
   CHATBOT FRONTEND
========================= */

const panel = document.getElementById("panel");
const messagesEl = document.getElementById("messages");
const chatInput = document.getElementById("chatInput");

let isOpen = false;

/* SESSION MEMORY */
if (!localStorage.getItem("sanche_session")) {
  localStorage.setItem(
    "sanche_session",
    crypto.randomUUID()
  );
}

/* =========================
   TOGGLE CHAT
========================= */
function toggleChat() {
  isOpen = !isOpen;

  panel.classList.toggle("open", isOpen);

  if (isOpen && messagesEl.children.length === 0) {
    addMessage(
      "Hey! 👋 I'm the Sanche AI assistant. What are you trying to build or improve right now?",
      "bot"
    );

    addQuickReplies();
  }

  if (isOpen) {
    setTimeout(() => {
      chatInput.focus();
    }, 250);
  }
}

/* =========================
   ADD MESSAGE
========================= */
function addMessage(text, type) {
  const div = document.createElement("div");

  div.className = `msg ${type}`;

  div.textContent = text;

  messagesEl.appendChild(div);

  messagesEl.scrollTop =
    messagesEl.scrollHeight;
}

/* =========================
   QUICK REPLIES
========================= */
function addQuickReplies() {
  const wrap = document.createElement("div");

  wrap.className = "quick";

  const options = [
    [
      "💰 Get Pricing",
      "I'd like pricing for an AI system"
    ],

    [
      "🤖 AI Chatbot",
      "Tell me about your AI chatbot services"
    ],

    [
      "🌐 Website",
      "I need a high-converting website"
    ],

    [
      "⚡ Automation",
      "I want to automate lead follow-up"
    ]
  ];

  options.forEach(([label, msg]) => {
    const btn =
      document.createElement("button");

    btn.textContent = label;

    btn.onclick = () => sendMessage(msg);

    wrap.appendChild(btn);
  });

  messagesEl.appendChild(wrap);

  messagesEl.scrollTop =
    messagesEl.scrollHeight;
}

/* =========================
   TYPING INDICATOR
========================= */
function showTyping() {
  removeTyping();

  const div = document.createElement("div");

  div.className = "typing-bubble";

  div.id = "typing";

  div.innerHTML = `
    <span></span>
    <span></span>
    <span></span>
  `;

  messagesEl.appendChild(div);

  messagesEl.scrollTop =
    messagesEl.scrollHeight;
}

function removeTyping() {
  document
    .getElementById("typing")
    ?.remove();
}

/* =========================
   SEND MESSAGE
========================= */
async function sendMessage(
  overrideText = ""
) {
  const text =
    (overrideText || chatInput.value).trim();

  if (!text) return;

  /* USER MESSAGE */
  addMessage(text, "user");

  chatInput.value = "";

  showTyping();

  try {
    const response = await fetch(
      "/api/bot",
      {
        method: "POST",

        headers: {
          "Content-Type":
            "application/json"
        },

        body: JSON.stringify({
          message: text,

          sessionId:
            localStorage.getItem(
              "sanche_session"
            )
        })
      }
    );

    const data =
      await response.json();

    removeTyping();

    /* FAILED RESPONSE */
    if (!data.success) {
      addMessage(
        "Something went wrong. Please try again.",
        "bot"
      );

      return;
    }

    /* BOT REPLY */
    addMessage(data.reply, "bot");

    /* HOT LEAD FOLLOW-UP */
    if (data.priority === "hot") {
      setTimeout(() => {
        addMessage(
          "You seem like a strong fit for this. Want a free strategy call to map everything out properly?",
          "bot"
        );
      }, 1200);
    }

  } catch (error) {
    console.error(error);

    removeTyping();

    addMessage(
      "Connection issue. Please refresh the page or email hello@sancheai.com",
      "bot"
    );
  }
}

/* =========================
   ENTER KEY SUPPORT
========================= */
chatInput.addEventListener(
  "keydown",
  e => {
    if (
      e.key === "Enter" &&
      !e.shiftKey
    ) {
      e.preventDefault();

      sendMessage();
    }
  }
);
</script>
