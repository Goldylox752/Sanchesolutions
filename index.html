<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sanche Solutions | AI Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:#f9f8f6;
  --text:#1a1a1a;
  --muted:#777;
  --border:#e8e5e0;
  --accent:#1a1a1a;
  --user:#1a1a1a;
  --userText:#fff;
  --bot:#f1efe9;
}

body {
  background:var(--bg);
  font-family:Geist,sans-serif;
  min-height:100vh;
}

/* FLOAT BUTTON */
.fab {
  position:fixed;
  bottom:24px;
  right:24px;
  width:56px;
  height:56px;
  border-radius:50%;
  background:var(--accent);
  color:white;
  border:none;
  cursor:pointer;
  font-size:20px;
  z-index:9999;
}

/* CHAT PANEL */
.panel {
  position:fixed;
  bottom:90px;
  right:24px;
  width:360px;
  height:520px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:16px;
  display:flex;
  flex-direction:column;
  opacity:0;
  transform:translateY(10px);
  pointer-events:none;
  transition:.2s;
  overflow:hidden;
}

.panel.open {
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

/* HEADER */
.header {
  padding:14px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title {
  font-family:"Instrument Serif";
  font-size:18px;
}

.close {
  border:none;
  background:none;
  font-size:18px;
  cursor:pointer;
}

/* MESSAGES */
.messages {
  flex:1;
  padding:12px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg {
  max-width:80%;
  padding:10px 12px;
  border-radius:12px;
  font-size:13px;
  line-height:1.4;
}

.user {
  background:var(--user);
  color:var(--userText);
  margin-left:auto;
}

.bot {
  background:var(--bot);
}

/* QUICK REPLIES */
.quick {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:6px;
}

.quick button {
  font-size:12px;
  padding:5px 10px;
  border:1px solid var(--border);
  border-radius:20px;
  background:transparent;
  cursor:pointer;
}

/* INPUT */
.input {
  display:flex;
  border-top:1px solid var(--border);
  padding:10px;
  gap:8px;
}

textarea {
  flex:1;
  resize:none;
  border:none;
  outline:none;
  background:var(--bot);
  padding:10px;
  border-radius:10px;
  font-family:inherit;
}

button.send {
  width:42px;
  border:none;
  background:var(--accent);
  color:#fff;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<button class="fab" id="fab">💬</button>

<div class="panel" id="panel">

  <div class="header">
    <div class="title">Sanche AI</div>
    <button class="close" id="close">✕</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <textarea id="input" placeholder="Ask about websites, SEO, automation..." rows="1"></textarea>
    <button class="send" id="send">➤</button>
  </div>

</div>

<script>
const API_URL = "https://sanchesolutions.onrender.com/api/bot";

/* ELEMENTS */
const fab = document.getElementById("fab");
const panel = document.getElementById("panel");
const closeBtn = document.getElementById("close");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const messages = document.getElementById("messages");

/* OPEN / CLOSE */
fab.onclick = () => {
  panel.classList.toggle("open");
  if (messages.children.length === 0) welcome();
};

closeBtn.onclick = () => panel.classList.remove("open");

/* WELCOME */
function welcome() {
  addBot("Hey 👋 I can help with websites, SEO, automation, and lead generation.");

  addQuickReplies();
}

/* ADD MESSAGE */
function add(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addBot(text) {
  add(text, "bot");
}

/* QUICK REPLIES (YOUR REQUEST) */
function addQuickReplies() {
  const div = document.createElement("div");
  div.className = "quick";

  ["Get Quote", "See Pricing", "Talk on WhatsApp"].forEach(t => {
    const b = document.createElement("button");
    b.textContent = t;
    b.onclick = () => send(t);
    div.appendChild(b);
  });

  messages.appendChild(div);
}

/* SEND */
async function send(text) {
  const msg = (text || input.value).trim();
  if (!msg) return;

  add(msg, "user");
  input.value = "";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();
    addBot(data.reply || "No response");

    /* NEW: show quick replies after bot response */
    addQuickReplies();

  } catch (e) {
    addBot("Server error. Please try again or contact us directly.");
  }
}

sendBtn.onclick = () => send();

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
