<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sanche Solutions | AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f9f8f6;
  --white: #ffffff;
  --text: #1a1a1a;
  --muted: #888;
  --border: #e8e5e0;
  --accent: #1a1a1a;
  --user-bg: #1a1a1a;
  --user-text: #ffffff;
  --bot-bg: #f1efe9;
  --bot-text: #1a1a1a;
  --shadow: 0 8px 40px rgba(0,0,0,0.12);
  --radius: 16px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  font-weight: 400;
  min-height: 100vh;
}

/* ─── FAB ─── */
.fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 54px;
  height: 54px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  box-shadow: 0 4px 20px rgba(0,0,0,0.20);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.fab:hover {
  transform: scale(1.06);
  box-shadow: 0 6px 28px rgba(0,0,0,0.28);
}

.fab svg { width: 22px; height: 22px; }

/* ─── PANEL ─── */
.panel {
  position: fixed;
  bottom: 90px;
  right: 24px;
  width: 360px;
  height: 520px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  z-index: 9999;
  box-shadow: var(--shadow);
  opacity: 0;
  transform: translateY(16px) scale(0.97);
  pointer-events: none;
  transition: opacity 0.22s ease, transform 0.22s ease;
  overflow: hidden;
}

.panel.open {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: all;
}

/* ─── HEADER ─── */
.header {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.header-left { display: flex; align-items: center; gap: 10px; }

.avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.avatar svg { width: 16px; height: 16px; }

.header-name {
  font-family: 'Instrument Serif', serif;
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.01em;
  color: var(--text);
  line-height: 1.2;
}

.header-status {
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
  display: flex;
  align-items: center;
  gap: 4px;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4CAF50;
  display: inline-block;
}

.close-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}

.close-btn:hover { background: var(--bot-bg); color: var(--text); }
.close-btn svg { width: 14px; height: 14px; }

/* ─── MESSAGES ─── */
.messages {
  flex: 1;
  padding: 16px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

.msg {
  max-width: 82%;
  padding: 10px 13px;
  border-radius: 12px;
  font-size: 13.5px;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
  animation: fadeUp 0.2s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-user {
  background: var(--user-bg);
  color: var(--user-text);
  margin-left: auto;
  border-bottom-right-radius: 4px;
}

.msg-bot {
  background: var(--bot-bg);
  color: var(--bot-text);
  margin-right: auto;
  border-bottom-left-radius: 4px;
}

/* Typing dots */
.typing {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 12px 14px;
  background: var(--bot-bg);
  border-radius: 12px;
  border-bottom-left-radius: 4px;
  width: fit-content;
}

.typing span {
  width: 6px;
  height: 6px;
  background: var(--muted);
  border-radius: 50%;
  display: inline-block;
  animation: blink 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
  40% { opacity: 1; transform: scale(1); }
}

/* Quick replies */
.quick-replies {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 4px 0 2px;
}

.qr-btn {
  font-family: 'Geist', sans-serif;
  font-size: 12px;
  color: var(--text);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 11px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  white-space: nowrap;
}

.qr-btn:hover { background: var(--bot-bg); border-color: #ccc; }

/* ─── INPUT AREA ─── */
.input-area {
  border-top: 1px solid var(--border);
  padding: 10px 12px;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  flex-shrink: 0;
}

.input-area textarea {
  flex: 1;
  font-family: 'Geist', sans-serif;
  font-size: 13.5px;
  color: var(--text);
  background: var(--bot-bg);
  border: 1px solid transparent;
  border-radius: 10px;
  padding: 9px 12px;
  resize: none;
  outline: none;
  min-height: 38px;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color 0.15s;
  overflow-y: auto;
}

.input-area textarea:focus { border-color: var(--border); }
.input-area textarea::placeholder { color: var(--muted); }

.send-btn {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.15s, transform 0.15s;
}

.send-btn:hover { opacity: 0.85; transform: scale(1.04); }
.send-btn:disabled { opacity: 0.35; cursor: default; transform: none; }
.send-btn svg { width: 16px; height: 16px; }

/* ─── MOBILE ─── */
@media (max-width: 480px) {
  .panel {
    bottom: 0;
    right: 0;
    left: 0;
    width: 100%;
    height: 100dvh;
    border-radius: 0;
    border: none;
  }

  .fab {
    bottom: 20px;
    right: 20px;
  }

  .panel.open ~ .fab { display: none; }
}
</style>
</head>

<body>

<!-- FAB -->
<button class="fab" id="fab" aria-label="Open chat">
  <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
</button>

<!-- PANEL -->
<div class="panel" id="panel" role="dialog" aria-label="Chat with Sanche AI">

  <div class="header">
    <div class="header-left">
      <div class="avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <div>
        <div class="header-name">Sanche AI</div>
        <div class="header-status"><span class="status-dot"></span> Online now</div>
      </div>
    </div>
    <button class="close-btn" id="closeBtn" aria-label="Close chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea id="input" placeholder="Ask me anything…" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</div>

<script>
const API_URL = "/api/bot";

const fab      = document.getElementById("fab");
const panel    = document.getElementById("panel");
const closeBtn = document.getElementById("closeBtn");
const input    = document.getElementById("input");
const sendBtn  = document.getElementById("sendBtn");
const messages = document.getElementById("messages");

let isOpen = false;
let isLoading = false;
let conversationHistory = [];

/* ─── OPEN / CLOSE ─── */
function openPanel() {
  isOpen = true;
  panel.classList.add("open");
  fab.setAttribute("aria-expanded", "true");
  if (messages.children.length === 0) showWelcome();
  setTimeout(() => input.focus(), 250);
}

function closePanel() {
  isOpen = false;
  panel.classList.remove("open");
  fab.setAttribute("aria-expanded", "false");
}

fab.addEventListener("click", () => isOpen ? closePanel() : openPanel());
closeBtn.addEventListener("click", closePanel);

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && isOpen) closePanel();
});

/* ─── WELCOME ─── */
function showWelcome() {
  addBotMessage("Hey 👋 I'm the Sanche AI assistant. I can help you with websites, automation, CRM systems, and lead generation.\n\nWhat are you working on?");

  const qr = document.createElement("div");
  qr.className = "quick-replies";

  const options = ["Build a website", "Set up automation", "CRM help", "Lead generation"];
  options.forEach(label => {
    const btn = document.createElement("button");
    btn.className = "qr-btn";
    btn.textContent = label;
    btn.addEventListener("click", () => {
      qr.remove();
      sendMessage(label);
    });
    qr.appendChild(btn);
  });

  messages.appendChild(qr);
  scrollDown();
}

/* ─── ADD MESSAGES ─── */
function addUserMessage(text) {
  const div = document.createElement("div");
  div.className = "msg msg-user";
  div.textContent = text;
  messages.appendChild(div);
  scrollDown();
}

function addBotMessage(text) {
  const div = document.createElement("div");
  div.className = "msg msg-bot";
  div.textContent = text;
  messages.appendChild(div);
  scrollDown();
  return div;
}

function showTyping() {
  const dots = document.createElement("div");
  dots.className = "typing";
  dots.id = "typing";
  dots.innerHTML = "<span></span><span></span><span></span>";
  messages.appendChild(dots);
  scrollDown();
  return dots;
}

function scrollDown() {
  messages.scrollTop = messages.scrollHeight;
}

/* ─── AUTO-RESIZE TEXTAREA ─── */
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 120) + "px";
});

/* ─── SEND ─── */
async function sendMessage(text) {
  text = (text || input.value).trim();
  if (!text || isLoading) return;

  input.value = "";
  input.style.height = "auto";
  isLoading = true;
  sendBtn.disabled = true;

  addUserMessage(text);
  conversationHistory.push({ role: "user", content: text });

  const dots = showTyping();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: text,
        history: conversationHistory.slice(-10) // send last 10 turns for context
      })
    });

    const data = await res.json();
    dots.remove();

    if (!res.ok || !data.reply) throw new Error(data.error || "No reply");

    addBotMessage(data.reply);
    conversationHistory.push({ role: "assistant", content: data.reply });

  } catch (err) {
    dots.remove();
    console.error(err);

    addBotMessage("I'm having trouble connecting right now. Let me redirect you to WhatsApp so we can continue there.");

    setTimeout(() => {
      window.open(
        "https://wa.me/17802679673?text=" + encodeURIComponent(text),
        "_blank"
      );
    }, 1200);
  }

  isLoading = false;
  sendBtn.disabled = false;
  input.focus();
}

sendBtn.addEventListener("click", () => sendMessage());

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
