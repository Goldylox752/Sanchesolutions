<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SancheSolutions · AI Automation & Revenue Systems</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* (your original styles stay unchanged — no need to rewrite UI) */
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: #020617;
  color: white;
}

.fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: #4f8cff;
  border: none;
  font-size: 24px;
  color: white;
  cursor: pointer;
}

.chat-panel {
  position: fixed;
  bottom: 100px;
  right: 24px;
  width: 380px;
  height: 560px;
  background: #0b1220;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
  transition: 0.2s;
}

.chat-panel.open {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.messages-area {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
}

.msg {
  margin: 6px 0;
  padding: 10px 14px;
  border-radius: 14px;
  max-width: 85%;
  word-wrap: break-word;
  font-size: 14px;
}

.user {
  background: #4f8cff;
  margin-left: auto;
}

.bot {
  background: #1a2238;
}

.input-area {
  display: flex;
  border-top: 1px solid #222;
}

.input-area input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
  background: transparent;
  color: white;
}

.input-area button {
  width: 60px;
  border: none;
  background: #4f8cff;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<button class="fab" id="fab">💬</button>

<div class="chat-panel" id="panel">

  <div class="messages-area" id="messages"></div>

  <div class="input-area">
    <input id="input" placeholder="Ask about pricing, demo, automation..." />
    <button id="send">➤</button>
  </div>

</div>

<script>
const API = "https://sanchesolutions.onrender.com/chat";

const panel = document.getElementById("panel");
const fab = document.getElementById("fab");
const messages = document.getElementById("messages");
const input = document.getElementById("input");
const send = document.getElementById("send");

let isSending = false;

/* ---------------- UI HELPERS ---------------- */

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

/* ---------------- CHAT CORE (FIXED) ---------------- */

async function sendMessage(text) {
  if (!text.trim() || isSending) return;

  isSending = true;

  addMsg(text, "user");
  input.value = "";

  const botMsg = addMsg("Thinking...", "bot");

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 20000);

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text }),
      signal: controller.signal
    });

    clearTimeout(timeout);

    if (!res.ok) throw new Error("API error");

    const reader = res.body?.getReader();

    // ✅ STREAMING SUPPORT
    if (reader) {
      const decoder = new TextDecoder();
      let full = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        full += chunk;

        botMsg.textContent = full;
        messages.scrollTop = messages.scrollHeight;
      }

      isSending = false;
      return;
    }

    // ✅ NON-STREAMING FALLBACK
    const text = await res.text();
    botMsg.textContent = text;

  } catch (err) {
    console.warn(err);
    botMsg.textContent =
      "⚠️ AI is temporarily unavailable. Please try again or contact support.";
  }

  isSending = false;
}

/* ---------------- EVENTS ---------------- */

fab.onclick = () => {
  panel.classList.toggle("open");
  if (messages.children.length === 0) {
    addMsg("👋 Hey! Ask me anything about automation, pricing, or demos.", "bot");
  }
};

send.onclick = () => sendMessage(input.value);

input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage(input.value);
});
</script>

</body>
</html>
