<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sanche Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:#0f0f10;
  --card:#161616;
  --text:#ffffff;
  --muted:#a1a1a1;
  --accent:#ffffff;
  --border:#2a2a2a;
}

/* PAGE BACKGROUND */
body {
  font-family: Geist, sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #0a0a0a);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* HERO */
.hero {
  max-width: 900px;
  margin: 0 auto;
  padding: 120px 20px;
  text-align: center;
}

.hero h1 {
  font-size: 52px;
  font-family: "Instrument Serif";
  font-weight: 400;
}

.hero p {
  margin-top: 20px;
  color: var(--muted);
  font-size: 18px;
  line-height: 1.6;
}

.cta {
  margin-top: 30px;
  display: inline-block;
  padding: 12px 20px;
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
}

/* FLOAT BUTTON */
.fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: black;
  border: none;
  cursor: pointer;
  font-size: 20px;
  z-index: 9999;
}

/* CHAT PANEL */
.panel {
  position: fixed;
  bottom: 90px;
  right: 24px;
  width: 360px;
  height: 520px;
  background: #111;
  border: 1px solid var(--border);
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateY(10px);
  pointer-events: none;
  transition: .2s;
  overflow: hidden;
}

.panel.open {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* HEADER */
.header {
  padding: 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title {
  font-family: "Instrument Serif";
  font-size: 18px;
}

/* MESSAGES */
.messages {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  max-width: 80%;
  padding: 10px 12px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.4;
}

.user {
  background: white;
  color: black;
  margin-left: auto;
}

.bot {
  background: #1c1c1c;
  color: white;
}

/* QUICK */
.quick {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}

.quick button {
  font-size: 12px;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: white;
  cursor: pointer;
}

/* INPUT */
.input {
  display: flex;
  border-top: 1px solid var(--border);
  padding: 10px;
  gap: 8px;
}

textarea {
  flex: 1;
  resize: none;
  border: none;
  outline: none;
  background: #1a1a1a;
  color: white;
  padding: 10px;
  border-radius: 10px;
}

button.send {
  width: 42px;
  border: none;
  background: white;
  color: black;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- HERO BACKGROUND -->
<div class="hero">
  <h1>Sanche Solutions</h1>
  <p>We build websites, automation systems, and AI tools that turn visitors into paying customers.</p>
  <div class="cta">Start a Project</div>
</div>

<!-- CHAT -->
<button class="fab" id="fab">💬</button>

<div class="panel" id="panel">

  <div class="header">
    <div class="title">Sanche AI</div>
    <button id="close">✕</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <textarea id="input" placeholder="Ask about websites, SEO..." rows="1"></textarea>
    <button class="send" id="send">➤</button>
  </div>

</div>

<script>
const API_URL = "https://sanchesolutions.onrender.com/api/bot";

const fab = document.getElementById("fab");
const panel = document.getElementById("panel");
const closeBtn = document.getElementById("close");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const messages = document.getElementById("messages");

fab.onclick = () => panel.classList.toggle("open");
closeBtn.onclick = () => panel.classList.remove("open");

function add(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addQuickReplies() {
  const div = document.createElement("div");
  div.className = "quick";

  ["Get Quote", "Pricing", "WhatsApp"].forEach(t => {
    const b = document.createElement("button");
    b.textContent = t;
    b.onclick = () => send(t);
    div.appendChild(b);
  });

  messages.appendChild(div);
}

async function send(text) {
  const msg = (text || input.value).trim();
  if (!msg) return;

  add(msg, "user");
  input.value = "";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();
    add(data.reply || "No response", "bot");

    addQuickReplies();

  } catch (e) {
    add("Server error. Try again.", "bot");
  }
}

sendBtn.onclick = () => send();

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
