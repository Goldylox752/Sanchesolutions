<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Sanche Solutions | AI Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#04060f;
  --surface:#080d1a;
  --surface2:#0c1422;
  --border:rgba(255,255,255,.06);
  --text:#eef2ff;
  --muted:#94a3b8;
  --accent:#63b3ed;
  --accent2:#7c6af7;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
}

/* BOT */
.ai-fab{
  position:fixed;
  bottom:24px;
  right:24px;
  width:58px;
  height:58px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
  z-index:99999;
}

.ai-panel{
  position:fixed;
  bottom:92px;
  right:24px;
  width:360px;
  height:480px;
  background:linear-gradient(160deg,var(--surface),var(--surface2));
  border:1px solid var(--border);
  border-radius:18px;
  display:none;
  flex-direction:column;
  z-index:99999;
  overflow:hidden;
}

.ai-header{
  padding:14px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
}

.ai-messages{
  flex:1;
  padding:14px;
  overflow-y:auto;
  font-size:13px;
}

.ai-msg{
  margin-bottom:10px;
  padding:10px 12px;
  border-radius:10px;
  white-space:pre-wrap;
  max-width:85%;
}

.ai-user{background:rgba(255,255,255,.05);margin-left:auto;}
.ai-bot{background:rgba(99,179,237,.08);}

.ai-input{
  display:flex;
  border-top:1px solid var(--border);
}

.ai-input input{
  flex:1;
  padding:12px;
  background:transparent;
  border:none;
  color:white;
  outline:none;
}

.ai-input button{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;
  padding:0 16px;
  cursor:pointer;
}

.loading{
  opacity:0.6;
  font-style:italic;
}
</style>
</head>

<body>

<div class="ai-fab" id="ai-fab">💬</div>

<div class="ai-panel" id="ai-panel">

  <div class="ai-header">
    <div>
      <b>Sanche AI</b><br>
      <span style="font-size:11px;color:#94a3b8;">Lead Assistant</span>
    </div>
    <div id="ai-close" style="cursor:pointer;">✕</div>
  </div>

  <div class="ai-messages" id="ai-messages"></div>

  <div class="ai-input">
    <input id="ai-input" placeholder="Tell me about your project..." />
    <button id="ai-send">Send</button>
  </div>

</div>

<script>
const fab = document.getElementById("ai-fab");
const panel = document.getElementById("ai-panel");
const closeBtn = document.getElementById("ai-close");
const input = document.getElementById("ai-input");
const sendBtn = document.getElementById("ai-send");
const messages = document.getElementById("ai-messages");

function addMsg(text, type){
  const div = document.createElement("div");
  div.className = "ai-msg " + type;
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

fab.onclick = () => {
  panel.style.display = "flex";

  if(messages.childElementCount === 0){
    addMsg(
`Hey 👋 I’m your AI assistant.

I help with:
• Websites
• AI automation
• CRM systems
• Lead generation`,
    "ai-bot"
    );
  }
};

closeBtn.onclick = () => panel.style.display = "none";

async function send(){
  const text = input.value.trim();
  if(!text) return;

  addMsg(text,"ai-user");
  input.value="";

  // loading message
  const loadingId = "loading-" + Date.now();
  addMsg("Thinking...", "ai-bot");

  try{
    const res = await fetch("/api/bot", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    // remove last loading message
    messages.lastChild.remove();

    if(!res.ok) throw new Error(data.error || "API failed");

    addMsg(data.reply || "No response.", "ai-bot");

  } catch(err){
    console.error(err);

    if(messages.lastChild){
      messages.lastChild.remove();
    }

    addMsg("AI offline — redirecting to WhatsApp...", "ai-bot");

    window.open(
      "https://wa.me/17802679673?text=" + encodeURIComponent(text),
      "_blank"
    );
  }
}

sendBtn.onclick = send;

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
