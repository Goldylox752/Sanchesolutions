<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>SancheSolutions · AI Automation & Revenue Systems</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: radial-gradient(circle at 20% 20%, #0b1a3a, #020617 60%);
  color: white;
  overflow-x: hidden;
}

/* FAB */
.fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, #4f8cff, #2a57cf);
  border: none;
  font-size: 24px;
  color: white;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: 0.2s;
}
.fab:hover { transform: scale(1.05); }

/* Chat */
.chat-panel {
  position: fixed;
  bottom: 100px;
  right: 24px;
  width: 380px;
  height: 580px;
  background: rgba(10,14,25,0.95);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(79,140,255,0.3);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
  transition: 0.25s ease;
}

.chat-panel.open {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* Messages */
.messages-area {
  flex: 1;
  padding: 14px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.4;
  word-break: break-word;
}

.user {
  background: linear-gradient(135deg, #4f8cff, #2a57cf);
  margin-left: auto;
}

.bot {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(79,140,255,0.25);
}

/* Input */
.input-area {
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.08);
}

.input-area input {
  flex: 1;
  padding: 14px;
  border: none;
  outline: none;
  background: transparent;
  color: white;
}

.input-area button {
  width: 60px;
  border: none;
  background: #4f8cff;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

/* Typing */
.typing {
  font-size: 12px;
  opacity: 0.7;
  font-style: italic;
}
</style>
</head>

<body>

<button class="fab" id="fab">💬</button>

<div class="chat-panel" id="panel">
  <div class="messages-area" id="messages"></div>

  <div class="input-area">
    <input id="input" placeholder="Ask about pricing, demos, automation..." />
    <button id="send">➤</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const API = "https://sanchesolutions.onrender.com/chat";

  const panel = document.getElementById("panel");
  const fab = document.getElementById("fab");
  const messages = document.getElementById("messages");
  const input = document.getElementById("input");
  const send = document.getElementById("send");

  let isSending = false;

  function addMsg(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function addTyping() {
    return addMsg("AI is thinking...", "bot");
  }

  function fallbackReply(text) {
    const msg = text.toLowerCase();

    if (msg.includes("price") || msg.includes("cost")) {
      return "💰 Pricing depends on automation scope. Most clients start at $2,500/month.";
    }
    if (msg.includes("demo")) {
      return "📅 I can help you book a demo. What industry are you in?";
    }
    if (msg.includes("ai") || msg.includes("automation")) {
      return "🤖 We build AI systems that automate leads, sales, and CRM workflows.";
    }
    return "✨ Tell me more about your business so I can recommend a solution.";
  }

  async function sendMessage(text) {
    if (!text.trim() || isSending) return;

    isSending = true;

    addMsg(text, "user");
    input.value = "";

    const botMsg = addTyping();

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 20000);

    try {
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
        signal: controller.signal
      });

      clearTimeout(timeout);

      if (!res.ok || !res.body) throw new Error("API error");

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      let full = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        full += decoder.decode(value, { stream: true });
        botMsg.textContent = full;
        messages.scrollTop = messages.scrollHeight;
      }

    } catch (err) {
      console.warn("API fallback:", err);
      botMsg.textContent = fallbackReply(text);
    }

    isSending = false;
  }

  fab.onclick = () => {
    panel.classList.toggle("open");

    if (messages.children.length === 0) {
      addMsg("👋 Hey, I’m your AI Revenue Assistant. Ask me about pricing, automation, or demos.", "bot");
    }
  };

  send.onclick = () => sendMessage(input.value);

  input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage(input.value);
  });

  console.log("✅ SancheSolutions AI loaded successfully");
});
</script>

</body>
</html>
