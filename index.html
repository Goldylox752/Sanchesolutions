<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sanche AI | Build Systems That Sell</title>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg1:#050505;
  --bg2:#0b0f1a;
  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.12);
  --text:#fff;
  --muted:rgba(255,255,255,0.65);
}

/* BACKGROUND */
body{
  font-family:Geist,sans-serif;
  color:var(--text);
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 20%, #1a2a6c33, transparent 40%),
    radial-gradient(circle at 80% 30%, #b21f1f22, transparent 40%),
    radial-gradient(circle at 50% 80%, #0f202733, transparent 40%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
}

/* HERO */
.hero{
  text-align:center;
  padding:140px 20px 70px;
  max-width:900px;
  margin:auto;
}
.hero h1{
  font-family:"Instrument Serif";
  font-size:74px;
  line-height:1.05;
}
.hero p{
  color:var(--muted);
  margin-top:18px;
  font-size:18px;
  line-height:1.6;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
}

.cta{
  margin-top:30px;
  display:inline-block;
  padding:14px 26px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--card);
  cursor:pointer;
  transition:.2s;
}
.cta:hover{transform:scale(1.05)}

/* FEATURES */
.section{
  padding:80px 20px;
  max-width:1100px;
  margin:auto;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
}
.card{
  padding:20px;
  border-radius:16px;
  background:var(--card);
  border:1px solid var(--border);
}

/* CHAT BUTTON */
.fab{
  position:fixed;
  bottom:24px;
  right:24px;
  width:58px;
  height:58px;
  border-radius:50%;
  background:white;
  color:black;
  border:none;
  cursor:pointer;
  z-index:9999;
  font-size:20px;
}

/* PANEL */
.panel{
  position:fixed;
  bottom:90px;
  right:24px;
  width:380px;
  height:560px;
  background:rgba(10,10,10,0.96);
  border:1px solid var(--border);
  border-radius:18px;
  display:flex;
  flex-direction:column;
  opacity:0;
  transform:translateY(10px);
  pointer-events:none;
  transition:.25s;
  backdrop-filter:blur(20px);
}
.panel.open{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

/* HEADER */
.header{
  padding:14px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  font-weight:500;
}

/* MESSAGES */
.messages{
  flex:1;
  padding:12px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:85%;
  padding:10px 12px;
  border-radius:12px;
  font-size:13px;
  line-height:1.4;
}

.user{
  background:white;
  color:black;
  margin-left:auto;
}
.bot{
  background:rgba(255,255,255,0.08);
}

/* INPUT */
.input{
  display:flex;
  border-top:1px solid var(--border);
  padding:10px;
  gap:8px;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

button.send{
  width:42px;
  border:none;
  border-radius:10px;
  background:white;
  cursor:pointer;
}

/* QUICK BUTTONS */
.quick{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.quick button{
  font-size:12px;
  padding:6px 10px;
  border-radius:20px;
  border:1px solid var(--border);
  background:transparent;
  color:white;
  cursor:pointer;
}

/* TYPING */
.typing{
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<section class="hero">
  <h1>AI Systems That Close Leads For You</h1>
  <p>
    We build automation systems, AI chat agents, and high-converting websites
    that turn traffic into paying customers — on autopilot.
  </p>

  <div class="cta" onclick="toggleChat()">
    Start Building
  </div>
</section>

<section class="section">
  <div class="grid">
    <div class="card">AI Sales Bots That Convert 24/7</div>
    <div class="card">Automation Systems & CRM Flows</div>
    <div class="card">High-Converting SaaS Websites</div>
  </div>
</section>

<!-- CHAT -->
<button class="fab" onclick="toggleChat()">💬</button>

<div class="panel" id="panel">

  <div class="header">
    <div>Sanche AI</div>
    <button onclick="toggleChat()">✕</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="input" placeholder="Ask about pricing, websites, SEO..." />
    <button class="send" onclick="send()">➤</button>
  </div>

</div>

<script>
const API_URL = "https://sanchesolutions.onrender.com/api/bot";
const SESSION_ID = "user_" + Math.random().toString(36).slice(2,10);

const panel = document.getElementById("panel");
const messages = document.getElementById("messages");
const input = document.getElementById("input");

function toggleChat(){
  panel.classList.toggle("open");

  if(messages.children.length === 0){
    add("Hey 👋 What are you trying to build?", "bot");
    addQuick();
  }
}

function add(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.textContent=text;
  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
}

function addQuick(){
  const div=document.createElement("div");
  div.className="quick";

  [
    ["Get Quote","quote"],
    ["Pricing","pricing"],
    ["Website Build","website"],
    ["Automation","automation"]
  ].forEach(i=>{
    const b=document.createElement("button");
    b.textContent=i[0];
    b.onclick=()=>send(i[1]);
    div.appendChild(b);
  });

  messages.appendChild(div);
}

function typing(){
  const div=document.createElement("div");
  div.className="typing";
  div.id="typing";
  div.textContent="Sanche AI is thinking...";
  messages.appendChild(div);
}

async function send(text){
  const msg=(text || input.value).trim();
  if(!msg) return;

  add(msg,"user");
  input.value="";

  typing();

  try{
    const res=await fetch(API_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        message:msg,
        sessionId:SESSION_ID
      })
    });

    const data=await res.json();

    document.getElementById("typing")?.remove();
    add(data.reply || "No response","bot");

  }catch(e){
    document.getElementById("typing")?.remove();
    add("Server offline — try again later.","bot");
  }
}

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
