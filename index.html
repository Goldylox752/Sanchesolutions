<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Sanche AI | AI Systems That Generate Leads & Close Sales</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#050814;
  --card:rgba(255,255,255,0.04);
  --border:rgba(120,160,255,0.18);
  --text:#eef3ff;
  --muted:rgba(210,220,255,0.65);
  --blue:#4f8cff;
  --blue2:#7aa8ff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:"DM Sans",sans-serif;
  background: radial-gradient(circle at 20% 10%, rgba(79,140,255,0.18), transparent 40%),
              radial-gradient(circle at 80% 90%, rgba(122,168,255,0.12), transparent 40%),
              var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 28px;
  background:rgba(5,8,20,0.6);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}

.logo{font-weight:600;}
.logo span{color:var(--blue);}

.btn{
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  border:none;
  padding:12px 18px;
  border-radius:12px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:120px 20px;
}

h1{
  font-size:52px;
  max-width:900px;
  line-height:1.05;
}

h1 span{
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

p{
  margin-top:18px;
  max-width:720px;
  color:var(--muted);
  font-size:18px;
  line-height:1.6;
}

/* CHAT */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:58px;
  height:58px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  color:white;
  cursor:pointer;
  font-size:20px;
}

.panel{
  position:fixed;
  bottom:90px;
  right:20px;
  width:360px;
  height:520px;
  background:rgba(10,14,30,0.95);
  border:1px solid var(--border);
  border-radius:18px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  opacity:0;
  transform:translateY(20px);
  pointer-events:none;
  transition:.25s;
}

.panel.open{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.header{
  padding:14px;
  border-bottom:1px solid var(--border);
  font-weight:600;
}

.messages{
  flex:1;
  padding:14px;
  overflow-y:auto;
}

.msg{
  padding:10px 12px;
  border-radius:12px;
  margin-bottom:10px;
  font-size:14px;
}

.user{
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  color:white;
  margin-left:auto;
  max-width:80%;
}

.bot{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  max-width:80%;
}

.input{
  display:flex;
  border-top:1px solid var(--border);
}

input{
  flex:1;
  padding:12px;
  background:transparent;
  border:none;
  color:white;
  outline:none;
}

button.send{
  width:50px;
  background:var(--blue);
  border:none;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Sanche<span>AI</span></div>
  <button class="btn">Book Call</button>
</nav>

<section class="hero">
  <h1>We Build AI Systems That <span>Close Sales Automatically</span></h1>
  <p>AI automation that generates leads, qualifies prospects, and closes deals 24/7.</p>
</section>

<!-- CHAT BUTTON -->
<button class="fab" onclick="toggleChat()">💬</button>

<!-- CHAT PANEL -->
<div class="panel" id="panel">
  <div class="header">AI Assistant</div>

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="input" placeholder="Ask anything..." />
    <button class="send" onclick="handleSend()">→</button>
  </div>
</div>

<script>
const API = "https://YOUR-RENDER-URL.onrender.com/chat";

const panel = document.getElementById("panel");
const messages = document.getElementById("messages");
const input = document.getElementById("input");

/* OPEN CHAT */
function toggleChat(){
  panel.classList.toggle("open");

  if(messages.children.length === 0){
    addMessage("Hi 👋 How can I help you scale your business?", "bot");
  }
}

/* ADD MESSAGE */
function addMessage(text, type, returnEl=false){
  const el = document.createElement("div");
  el.className = `msg ${type}`;
  el.textContent = text;

  messages.appendChild(el);
  messages.scrollTop = messages.scrollHeight;

  if(returnEl) return el;
}

/* SCROLL */
function scroll(){
  messages.scrollTop = messages.scrollHeight;
}

/* SEND MESSAGE (STREAMING) */
async function handleSend(){
  const text = input.value.trim();
  if(!text) return;

  input.value = "";

  // user message
  addMessage(text, "user");

  // bot bubble (stream target)
  const botBubble = addMessage("", "bot", true);

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    if(!res.body){
      botBubble.textContent = "No response";
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    let full = "";

    while(true){
      const { value, done } = await reader.read();
      if(done) break;

      full += decoder.decode(value, { stream:true });
      botBubble.textContent = full;

      scroll();
    }

  } catch(err){
    botBubble.textContent = "Connection error";
  }
}

/* ENTER KEY */
input.addEventListener("keydown", e => {
  if(e.key === "Enter") handleSend();
});
</script>

</body>
</html>
