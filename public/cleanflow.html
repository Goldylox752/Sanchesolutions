<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CleanFlow AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #111;
    }

    .hero {
      padding: 80px 20px;
      text-align: center;
      background: white;
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      color: #555;
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .card {
      display: inline-block;
      width: 250px;
      margin: 10px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <h1>🧼 CleanFlow AI</h1>
    <p>AI-powered cleaning bookings & lead automation for service businesses</p>
  </div>

  <!-- FEATURES -->
  <div class="section">
    <h2>Why Businesses Use It</h2>

    <div class="card">⚡ Instant replies 24/7</div>
    <div class="card">📅 Auto booking system</div>
    <div class="card">💰 More leads converted</div>
    <div class="card">📲 WhatsApp integration</div>
  </div>

  <!-- HOW IT WORKS -->
  <div class="section">
    <h2>How It Works</h2>
    <p>Customer messages → AI qualifies → Booking is scheduled → You get paid jobs</p>
  </div>

  <!-- BOT SCRIPT -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const button = document.createElement("div");
      button.innerHTML = "🧼";
      button.style.cssText = `
        position:fixed;bottom:20px;right:20px;
        width:60px;height:60px;background:#111;
        color:white;border-radius:50%;
        display:flex;align-items:center;
        justify-content:center;font-size:28px;
        cursor:pointer;
      `;

      const chat = document.createElement("div");
      chat.style.cssText = `
        position:fixed;bottom:90px;right:20px;
        width:320px;height:420px;background:white;
        border:1px solid #ddd;border-radius:12px;
        display:none;padding:10px;font-family:Arial;
      `;

      chat.innerHTML = `
        <h3>CleanFlow AI</h3>
        <p>What type of cleaning do you need?</p>
      `;

      document.body.appendChild(button);
      document.body.appendChild(chat);

      button.onclick = () => {
        chat.style.display = chat.style.display === "none" ? "block" : "none";
      };
    });
  </script>

</body>
</html>
