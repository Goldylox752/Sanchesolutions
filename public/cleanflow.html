<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CleanFlow AI</title>
</head>

<body>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const button = document.createElement("div");
  button.id = "cleanflow-button";
  button.innerHTML = "🧼";

  const chat = document.createElement("div");
  chat.id = "cleanflow-chat";

  chat.innerHTML = `
    <div id="cleanflow-header">
      <h3>CleanFlow AI</h3>
      <span id="cleanflow-close">✕</span>
    </div>

    <div id="cleanflow-messages">
      <div class="bot-message">
        Hey 👋 I’m CleanFlow AI.<br><br>
        What type of cleaning do you need today?
      </div>
    </div>

    <div id="cleanflow-input-area">
      <input type="text" id="cleanflow-input" placeholder="Type your message..." />
      <button id="cleanflow-send">Send</button>
    </div>
  `;

  document.body.appendChild(button);
  document.body.appendChild(chat);

  const style = document.createElement("style");

  style.innerHTML = `
    #cleanflow-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 65px;
      height: 65px;
      background: #0f0f0f;
      color: white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      cursor: pointer;
      z-index: 9999;
    }

    #cleanflow-chat {
      position: fixed;
      bottom: 95px;
      right: 20px;
      width: 340px;
      max-height: 520px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      display: none;
      flex-direction: column;
      z-index: 9999;
    }

    #cleanflow-header {
      background: #0f0f0f;
      color: white;
      padding: 14px;
      display: flex;
      justify-content: space-between;
    }

    #cleanflow-messages {
      padding: 15px;
      height: 360px;
      overflow-y: auto;
      background: #f6f6f6;
    }

    .bot-message, .user-message {
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 10px;
      max-width: 80%;
    }

    .bot-message { background: white; }
    .user-message { background: #111; color: white; margin-left: auto; }

    #cleanflow-input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    #cleanflow-input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
    }

    #cleanflow-send {
      background: #111;
      color: white;
      border: none;
      padding: 0 16px;
    }
  `;

  document.head.appendChild(style);

  let step = "intro";

  button.onclick = () => {
    chat.style.display = chat.style.display === "flex" ? "none" : "flex";
  };

  document.getElementById("cleanflow-close").onclick = () => {
    chat.style.display = "none";
  };

  const input = document.getElementById("cleanflow-input");
  const sendBtn = document.getElementById("cleanflow-send");
  const messages = document.getElementById("cleanflow-messages");

  sendBtn.onclick = handleSend;

  function handleSend() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user-message");
    input.value = "";

    setTimeout(() => {
      addMessage(botLogic(text), "bot-message");
    }, 500);
  }

  function botLogic(text) {
    const msg = text.toLowerCase();

    if (step === "intro") {
      step = "service";
      return "Great 👍 What type of cleaning do you need?";
    }

    if (msg.includes("house") || msg.includes("deep") || msg.includes("move")) {
      step = "location";
      return "Perfect 👍 What area are you in?";
    }

    if (step === "location") {
      step = "size";
      return "Awesome 👍 How big is the place?";
    }

    if (step === "size") {
      step = "booking";
      return "When would you like it cleaned?";
    }

    if (step === "booking") {
      step = "lead";
      return "Perfect 👍 What’s your phone or email?";
    }

    return "What type of cleaning do you need? 🧼";
  }

  function addMessage(text, className) {
    const div = document.createElement("div");
    div.className = className;
    div.innerHTML = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }
});
</script>

</body>
</html>
