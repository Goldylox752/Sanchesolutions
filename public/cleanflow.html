<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CleanFlow AI - Cleaning Bot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .hero {
      text-align: center;
      padding: 70px 20px;
      background: white;
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #555;
    }

    #bot-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      background: #111;
      color: white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    #chat {
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 340px;
      height: 450px;
      background: white;
      border-radius: 12px;
      border: 1px solid #ddd;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      background: #111;
      color: white;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: #f7f7f7;
      font-size: 14px;
    }

    .msg {
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      max-width: 80%;
    }

    .bot {
      background: white;
    }

    .user {
      background: #111;
      color: white;
      margin-left: auto;
    }

    #input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    #input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    #send {
      background: #111;
      color: white;
      border: none;
      padding: 0 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <h1>🧼 CleanFlow AI</h1>
    <p>Automated Cleaning Booking Assistant</p>
  </div>

  <!-- BOT -->
  <div id="bot-btn">🧼</div>

  <div id="chat">
    <div id="header">
      <span>CleanFlow AI</span>
      <span id="close">✕</span>
    </div>

    <div id="messages">
      <div class="msg bot">
        Hey 👋 I can help you book a cleaning service.<br><br>
        What type of cleaning do you need? (House, Office, Deep, Move-out)
      </div>
    </div>

    <div id="input-area">
      <input id="input" placeholder="Type here..." />
      <button id="send">Send</button>
    </div>
  </div>

<script>
let step = 0;

const btn = document.getElementById("bot-btn");
const chat = document.getElementById("chat");
const close = document.getElementById("close");
const messages = document.getElementById("messages");
const input = document.getElementById("input");
const send = document.getElementById("send");

btn.onclick = () => chat.style.display = "flex";
close.onclick = () => chat.style.display = "none";

send.onclick = handle;
input.addEventListener("keypress", e => {
  if (e.key === "Enter") handle();
});

function handle() {
  const text = input.value.trim();
  if (!text) return;

  add(text, "user");
  input.value = "";

  setTimeout(() => {
    add(bot(text), "bot");
  }, 500);
}

function bot(msg) {
  msg = msg.toLowerCase();

  if (step === 0) {
    step = 1;
    return "Perfect 👍 What area are you located in?";
  }

  if (step === 1) {
    step = 2;
    return "Nice 👍 How big is the space? (1 bed / 2–3 bed / large home / office)";
  }

  if (step === 2) {
    step = 3;
    return "Great 👍 When would you like the cleaning done?";
  }

  if (step === 3) {
    step = 4;
    return "Last step 👍 What’s the best phone number or email to confirm your booking?";
  }

  return "What type of cleaning do you need? 🧼";
}

function add(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
