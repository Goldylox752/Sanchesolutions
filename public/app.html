<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MacFlip AI • Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f14;
  --panel:#121a24;
  --border:rgba(255,255,255,.08);
  --text:#eaf1ff;
  --muted:#93a4b8;
  --accent:#00e5a0;
  --accent2:#00b6ff;
  --danger:#ff4d6d;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}

body{
  background:radial-gradient(circle at top,#0f1620,#070a0f);
  color:var(--text);
  height:100vh;
  overflow:hidden;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  background:rgba(10,15,22,.7);
  backdrop-filter:blur(20px);
}

.logo{font-weight:800}

.badge{
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(0,229,160,.12);
  border:1px solid rgba(0,229,160,.25);
  color:var(--accent);
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:280px 1fr;
  height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar{
  border-right:1px solid var(--border);
  padding:16px;
  background:rgba(18,26,36,.4);
}

.btn{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.02);
  color:var(--text);
  cursor:pointer;
  text-align:left;
}

.btn:hover{
  border-color:rgba(0,229,160,.4);
}

.btn.active{
  background:rgba(0,229,160,.1);
  border-color:rgba(0,229,160,.4);
}

/* MAIN */
.main{
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* TOPBAR */
.topbar{
  padding:16px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.cta{
  padding:10px 14px;
  border-radius:10px;
  border:none;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}

/* DEAL GRID */
.deals{
  padding:16px;
  overflow:auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;
}

/* CARD */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  transition:.2s;
}

.card:hover{
  transform:translateY(-2px);
  border-color:rgba(0,229,160,.25);
}

.meta{
  font-size:12px;
  color:var(--muted);
  margin:6px 0;
}

.profit{
  font-weight:800;
  margin:10px 0;
}

.good{color:var(--accent)}
.bad{color:var(--danger)}

/* LOCK SCREEN */
.lock{
  padding:20px;
  border:1px solid var(--border);
  border-radius:14px;
  background:rgba(255,255,255,.02);
}

.lock button{
  margin-top:10px;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">MacFlip AI • Dashboard</div>
  <div class="badge" id="status">INIT</div>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <button class="btn active" onclick="loadDeals()">🔥 Live Deals</button>
    <button class="btn" onclick="checkout()">💳 Upgrade</button>
    <button class="btn" onclick="logout()">🚪 Logout</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <div>Real-time MacBook Flip Scanner</div>
      <button class="cta" onclick="loadDeals()">Scan Now</button>
    </div>

    <div class="deals" id="deals"></div>

  </main>

</div>

<script>

const API = "/api/deals";
const dealsEl = document.getElementById("deals");
const statusEl = document.getElementById("status");

/* TOKEN */
function getToken(){
  return localStorage.getItem("sb_token");
}

/* LOAD DEALS */
async function loadDeals(){

  const token = getToken();

  if(!token){
    showLocked();
    statusEl.textContent = "LOGIN REQUIRED";
    return;
  }

  statusEl.textContent = "SCANNING...";

  try{
    const res = await fetch(API,{
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    if(res.status === 401){
      showLocked("Invalid session. Please login again.");
      return;
    }

    if(res.status === 403){
      showLocked("Pro subscription required.");
      return;
    }

    const data = await res.json();

    renderDeals(data.deals || []);
    statusEl.textContent = "LIVE";
  }
  catch(err){
    statusEl.textContent = "ERROR";
    console.error(err);
  }
}

/* RENDER */
function renderDeals(deals){
  dealsEl.innerHTML="";

  deals.forEach(d=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div><b>${d.title}</b></div>
      <div class="meta">Buy: $${d.buy} • Resale: $${d.resale}</div>
      <div class="profit ${d.good ? "good":"bad"}">
        Profit: $${d.profit}
      </div>
      <a href="${d.url}" target="_blank">View →</a>
    `;

    dealsEl.appendChild(div);
  });
}

/* LOCK UI */
function showLocked(msg="Access Required"){
  dealsEl.innerHTML=`
    <div class="lock">
      <h3>🔒 ${msg}</h3>
      <p class="meta">Unlock real-time MacBook flip alerts for $9.99/month</p>
      <button onclick="checkout()">Upgrade Now</button>
    </div>
  `;
}

/* STRIPE */
async function checkout(){
  const token = getToken();

  const res = await fetch("/api/checkout",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      user_id:"demo",
      email:"demo@user.com"
    })
  });

  const data = await res.json();
  if(data.url) window.location.href = data.url;
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("sb_token");
  location.reload();
}

/* INIT */
loadDeals();

</script>

</body>
</html>
