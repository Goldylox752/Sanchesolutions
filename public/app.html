<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SancheSolutions · AI Operator Dashboard</title>

<style>
:root{
  --bg:#070A12;
  --panel:#0E1424;
  --panel2:#0B1020;
  --border:rgba(255,255,255,0.08);
  --accent:#38f2a5;
  --text:#EAF2FF;
  --danger:#ff4d4d;
  --muted:rgba(255,255,255,0.6);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  padding:14px 18px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title{
  font-size:14px;
  font-weight:700;
  letter-spacing:0.5px;
}

.badge{
  font-size:12px;
  padding:6px 10px;
  border-radius:20px;
  background:rgba(56,242,165,0.12);
  color:var(--accent);
}

.locked{
  background:rgba(255,77,77,0.12);
  color:var(--danger);
}

/* LAYOUT */
.wrapper{
  display:flex;
  flex:1;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:var(--panel);
  border-right:1px solid var(--border);
  padding:14px;
}

.section-title{
  font-size:11px;
  color:var(--muted);
  margin:10px 0;
}

.agent{
  padding:10px;
  margin-bottom:8px;
  border-radius:10px;
  background:var(--panel2);
  cursor:pointer;
  border:1px solid var(--border);
  transition:0.2s;
}

.agent:hover{
  border-color:var(--accent);
}

.agent.active{
  background:var(--accent);
  color:#000;
  font-weight:700;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOP METRICS */
.metrics{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:14px;
  border-bottom:1px solid var(--border);
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  padding:12px;
  border-radius:12px;
}

.card h3{
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
}

.card p{
  font-size:16px;
  font-weight:700;
}

/* CHAT */
.chat{
  flex:1;
  overflow-y:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:12px 14px;
  border-radius:12px;
  font-size:14px;
  line-height:1.4;
}

.user{
  background:var(--accent);
  color:#000;
  align-self:flex-end;
}

.ai{
  background:var(--panel);
  border:1px solid var(--border);
  align-self:flex-start;
}

/* INPUT */
.input-bar{
  display:flex;
  gap:10px;
  padding:12px;
  background:var(--panel);
  border-top:1px solid var(--border);
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:white;
  outline:none;
}

button{
  padding:12px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

.send{
  background:var(--accent);
  color:#000;
}

.upgrade{
  background:var(--danger);
  color:white;
}
</style>
</head>

<body>

<header>
  <div class="title">SancheSolutions · AI Operator Control Center</div>
  <div id="status" class="badge locked">INITIALIZING</div>
</header>

<div class="wrapper">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="section-title">AI SYSTEMS</div>
    <div class="agent active" onclick="setAgent('cleanflow')">CleanFlow AI</div>
    <div class="agent" onclick="setAgent('roofflow')">RoofFlow AI</div>
    <div class="agent" onclick="setAgent('sales')">Sales Bot</div>

    <div class="section-title">CONTROL</div>
    <div class="agent">Deploy System</div>
    <div class="agent">Pause AI</div>
    <div class="agent">Export Leads</div>

  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- METRICS -->
    <div class="metrics">
      <div class="card">
        <h3>Active AI</h3>
        <p id="activeAI">CleanFlow</p>
      </div>

      <div class="card">
        <h3>Status</h3>
        <p id="statusText">Free Mode</p>
      </div>

      <div class="card">
        <h3>System Load</h3>
        <p>Stable</p>
      </div>
    </div>

    <!-- CHAT -->
    <div class="chat" id="chat"></div>

    <!-- INPUT -->
    <div class="input-bar">
      <input id="input" placeholder="Command AI system..." />
      <button class="send" onclick="send()">Execute</button>
      <button class="upgrade" onclick="goStripe()">Upgrade</button>
    </div>

  </div>
</div>

<script>

/* CONFIG */
const API_URL =
  window.location.hostname === "localhost"
    ? "http://localhost:3000"
    : "https://sanchesolutions.onrender.com";

const CHAT = `${API_URL}/api/chat`;
const STRIPE = `${API_URL}/api/create-checkout-session`;

/* STATE */
let sessionId = localStorage.getItem("sessionId") || crypto.randomUUID();
localStorage.setItem("sessionId", sessionId);

let plan = localStorage.getItem("plan") || "free";
let agent = "cleanflow";

/* UI */
const chat = document.getElementById("chat");
const input = document.getElementById("input");

const status = document.getElementById("status");
const statusText = document.getElementById("statusText");
const activeAI = document.getElementById("activeAI");

function addMsg(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* AGENT SWITCH */
function setAgent(a){
  agent = a;
  activeAI.textContent = a.charAt(0).toUpperCase() + a.slice(1);

  document.querySelectorAll(".agent").forEach(e=>{
    e.classList.remove("active");
  });

  event.target.classList.add("active");

  addMsg(`Switched to ${a.toUpperCase()} AI system`, "ai");
}

/* PLAN */
async function checkPlan(){
  await fetch(`${API_URL}/api/health`);

  if(plan === "pro"){
    status.textContent = "PRO ACTIVE";
    status.className = "badge";
    statusText.textContent = "Pro Mode";
    addMsg("Full AI Operator access unlocked.", "ai");
  } else {
    status.textContent = "FREE MODE";
    status.className = "badge locked";
    statusText.textContent = "Limited";
    addMsg("System running in restricted mode.", "ai");
  }
}

/* CHAT */
async function send(){

  const text = input.value.trim();
  if(!text) return;

  addMsg(text, "user");
  input.value = "";

  if(plan !== "pro"){
    addMsg("Upgrade required to execute AI commands.", "ai");
    return;
  }

  try {

    const res = await fetch(CHAT, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        message: text,
        sessionId,
        agent
      })
    });

    const data = await res.json();

    addMsg(data.reply || "No response", "ai");

  } catch {
    addMsg("AI system error", "ai");
  }
}

/* STRIPE */
async function goStripe(){

  const res = await fetch(STRIPE, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: "test@test.com",
      user_id: sessionId
    })
  });

  const data = await res.json();

  if(data.url){
    localStorage.setItem("checkout", "1");
    window.location.href = data.url;
  } else {
    addMsg("Stripe failed", "ai");
  }
}

/* AUTO UPGRADE */
if(window.location.search.includes("success=1")){
  localStorage.setItem("plan", "pro");
  plan = "pro";
}

/* INIT */
window.onload = () => {
  addMsg("SancheSolutions AI Operator System online.", "ai");
  checkPlan();
};

</script>

</body>
</html>
