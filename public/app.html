<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CleanFlow AI · Booking Assistant</title>

<style>
:root{
  --bg:#060914;
  --panel:#0c1328;
  --border:rgba(255,255,255,0.08);
  --accent:#38f2a5;
  --text:#eaf2ff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  padding:14px 16px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  font-size:15px;
}

.badge{
  font-size:12px;
  padding:6px 10px;
  border-radius:20px;
  background:rgba(56,242,165,0.12);
  color:var(--accent);
}

/* CHAT */
.chat{
  flex:1;
  overflow-y:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:12px 14px;
  border-radius:12px;
  font-size:14px;
  line-height:1.4;
  white-space:pre-wrap;
}

.user{
  background:var(--accent);
  color:#000;
  align-self:flex-end;
}

.ai{
  background:var(--panel);
  border:1px solid var(--border);
  align-self:flex-start;
}

/* INPUT */
.input-bar{
  display:flex;
  gap:10px;
  padding:12px;
  background:var(--panel);
  border-top:1px solid var(--border);
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:white;
  outline:none;
}

button{
  padding:12px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

.send{
  background:var(--accent);
  color:#000;
}

.small{
  text-align:center;
  font-size:12px;
  opacity:0.6;
  padding:6px;
}
</style>
</head>

<body>

<header>
  <h1>CleanFlow AI · Booking Bot</h1>
  <div class="badge">AI Lead Closer</div>
</header>

<div class="chat" id="chat"></div>

<div class="small">
  AI Sales Assistant · Turns Visitors Into Cleaning Bookings
</div>

<div class="input-bar">
  <input id="input" placeholder="Tell me what you need cleaned..." />
  <button class="send" onclick="send()">Send</button>
</div>

<script>

const API_URL =
  window.location.hostname === "localhost"
    ? "http://localhost:5000"
    : "https://sanchesolutions.onrender.com";

const CHAT_ENDPOINT = `${API_URL}/api/chat`;
const HEALTH_ENDPOINT = `${API_URL}/api/health`;

const sessionId =
  localStorage.getItem("sessionId") ||
  crypto.randomUUID();

localStorage.setItem("sessionId", sessionId);

const chat = document.getElementById("chat");
const input = document.getElementById("input");

/* ───────── UI ───────── */

function addMsg(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function typing(){
  const div = document.createElement("div");
  div.className = "msg ai";
  div.textContent = "Finding best cleaning option...";
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

/* ───────── SEND ───────── */

async function send(){

  const text = input.value.trim();
  if(!text) return;

  addMsg(text, "user");
  input.value = "";

  const loader = typing();

  try {

    const res = await fetch(CHAT_ENDPOINT, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        message: text,
        sessionId
      })
    });

    const data = await res.json();

    loader.textContent =
      data.reply ||
      "I can help you book a cleaner today.";

  } catch (err) {
    console.error(err);
    loader.textContent = "⚠️ Unable to connect to booking system";
  }
}

/* ───────── EVENTS ───────── */

input.addEventListener("keydown", (e)=>{
  if(e.key === "Enter") send();
});

/* ───────── INIT ───────── */

window.onload = () => {
  addMsg(
    "👋 Hi! I’m your CleanFlow AI assistant. I help you book trusted cleaning services instantly. What do you need cleaned today?",
    "ai"
  );
  input.focus();
};

</script>

</body>
</html>
