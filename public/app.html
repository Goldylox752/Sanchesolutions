<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MacFlip AI • Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f14;
  --panel:#121a24;
  --border:rgba(255,255,255,.08);
  --text:#eaf1ff;
  --muted:#93a4b8;
  --accent:#00e5a0;
  --accent2:#00b6ff;
  --danger:#ff4d6d;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}

body{
  background:radial-gradient(circle at top,#0f1620,#070a0f);
  color:var(--text);
  height:100vh;
  overflow:hidden;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  background:rgba(10,15,22,.7);
  backdrop-filter:blur(20px);
}

.logo{
  font-weight:800;
  letter-spacing:-0.5px;
}

.badge{
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(0,229,160,.12);
  border:1px solid rgba(0,229,160,.25);
  color:var(--accent);
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:280px 1fr;
  height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar{
  border-right:1px solid var(--border);
  padding:16px;
  background:rgba(18,26,36,.4);
}

.sidebar h3{
  font-size:11px;
  color:var(--muted);
  margin-bottom:10px;
  letter-spacing:1px;
}

.btn{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.02);
  color:var(--text);
  cursor:pointer;
  text-align:left;
  transition:.2s;
}

.btn:hover{
  transform:translateY(-1px);
  border-color:rgba(0,229,160,.4);
}

.btn.active{
  background:rgba(0,229,160,.1);
  border-color:rgba(0,229,160,.4);
}

/* MAIN */
.main{
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* TOP BAR */
.topbar{
  padding:16px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.cta{
  padding:10px 14px;
  border-radius:10px;
  border:none;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}

/* DEALS */
.deals{
  padding:16px;
  overflow:auto;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
}

.card h4{
  font-size:13px;
  margin-bottom:8px;
}

.meta{
  font-size:12px;
  color:var(--muted);
  margin-bottom:8px;
}

.profit{
  font-weight:700;
  margin-bottom:10px;
}

.good{
  color:var(--accent);
}

.bad{
  color:var(--danger);
}

a{
  font-size:12px;
  color:var(--accent2);
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <div class="logo">MacFlip AI • Dashboard</div>
  <div class="badge" id="status">Loading...</div>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>CONTROLS</h3>

    <button class="btn active" onclick="loadDeals()">🔥 Live Deals</button>
    <button class="btn" onclick="alert('Connect Stripe / Supabase profile here')">💳 Subscription</button>
    <button class="btn" onclick="loadDeals()">🔄 Refresh Scan</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <div>Real-time MacBook Flip Opportunities</div>
      <button class="cta" onclick="loadDeals()">Scan Now</button>
    </div>

    <div class="deals" id="deals"></div>

  </main>

</div>

<script>

const API = "/api/deals";

const dealsEl = document.getElementById("deals");
const statusEl = document.getElementById("status");

/* LOAD DEALS */
async function loadDeals(){
  try{
    statusEl.textContent = "Scanning...";

    const res = await fetch(API, {
      headers: {
        Authorization: "Bearer demo-token"
      }
    });

    if(res.status === 403){
      statusEl.textContent = "PRO REQUIRED";
      dealsEl.innerHTML = `
        <div class="card">
          <h4>🔒 Pro Access Required</h4>
          <p class="meta">Subscribe to unlock live MacBook flip alerts.</p>
        </div>
      `;
      return;
    }

    const data = await res.json();

    renderDeals(data.deals || []);
    statusEl.textContent = "LIVE";
  }
  catch(err){
    statusEl.textContent = "ERROR";
    console.error(err);
  }
}

/* RENDER */
function renderDeals(deals){
  dealsEl.innerHTML = "";

  deals.forEach(d => {
    const div = document.createElement("div");
    div.className = "card";

    const good = d.good;

    div.innerHTML = `
      <h4>${d.title}</h4>
      <div class="meta">Buy: $${d.buy} • Resale: $${d.resale}</div>

      <div class="profit ${good ? "good" : "bad"}">
        Profit: $${d.profit}
      </div>

      <a href="${d.url}" target="_blank">View Listing →</a>
    `;

    dealsEl.appendChild(div);
  });
}

/* INIT */
loadDeals();

</script>

</body>
</html>
