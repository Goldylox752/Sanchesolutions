<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SancheSolutions • AI Sales Widget</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f14;
  --panel:#121a24;
  --border:rgba(255,255,255,.08);
  --text:#eaf1ff;
  --muted:#93a4b8;
  --accent:#00e5a0;
  --accent2:#00b6ff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter,sans-serif;
  background:radial-gradient(circle at top,#0f1620,#070a0f);
  color:var(--text);
  height:100vh;
  overflow:hidden;
}

/* HEADER */
header{
  padding:18px 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
  background:rgba(10,15,22,.7);
  backdrop-filter:blur(20px);
}

.logo{
  font-weight:800;
  letter-spacing:-0.5px;
}

.badge{
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(0,229,160,.12);
  border:1px solid rgba(0,229,160,.25);
  color:var(--accent);
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:280px 1fr;
  height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar{
  padding:18px;
  border-right:1px solid var(--border);
  background:rgba(18,26,36,.5);
}

.sidebar h3{
  font-size:12px;
  color:var(--muted);
  margin-bottom:10px;
  letter-spacing:1px;
}

.agent{
  padding:14px;
  margin-bottom:10px;
  border-radius:14px;
  border:1px solid var(--border);
  cursor:pointer;
  transition:.2s;
  background:rgba(255,255,255,.02);
}

.agent:hover{
  transform:translateY(-2px);
  border-color:rgba(0,229,160,.3);
}

.agent.active{
  background:rgba(0,229,160,.08);
  border-color:rgba(0,229,160,.4);
}

.agent b{
  font-size:13px;
}

.agent p{
  font-size:11px;
  color:var(--muted);
  margin-top:6px;
}

/* CHAT AREA */
.chat-wrap{
  display:flex;
  flex-direction:column;
  height:100%;
}

.chat{
  flex:1;
  overflow:auto;
  padding:22px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{
  max-width:70%;
  padding:12px 14px;
  border-radius:14px;
  font-size:13px;
  line-height:1.5;
  animation:fade .2s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

.user{
  align-self:flex-end;
  background:linear-gradient(135deg,var(--accent2),#6ee7ff);
  color:#06202c;
}

.ai{
  align-self:flex-start;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
}

/* INPUT */
.input-bar{
  display:flex;
  padding:14px;
  border-top:1px solid var(--border);
  background:rgba(10,15,22,.7);
  backdrop-filter:blur(20px);
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0c121a;
  color:var(--text);
  outline:none;
}

button{
  margin-left:10px;
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-weight:700;
  cursor:pointer;
}

/* FLOAT BUTTON (INTERCOM STYLE) */
.fab{
  position:fixed;
  bottom:22px;
  right:22px;
  width:56px;
  height:56px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  color:#000;
  cursor:pointer;
  box-shadow:0 20px 40px rgba(0,229,160,.25);
}

.widget{
  position:fixed;
  bottom:90px;
  right:22px;
  width:380px;
  height:520px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  display:none;
  flex-direction:column;
  overflow:hidden;
}

.widget.open{display:flex}
</style>
</head>

<body>

<header>
  <div class="logo">SancheSolutions <span class="badge">AI Sales Mode</span></div>
  <div class="badge">SYSTEM ONLINE</div>
</header>

<div class="container">

  <aside class="sidebar">
    <h3>AI AGENTS</h3>

    <div class="agent active" onclick="switchAgent('sales')">
      <b>Sales Agent</b>
      <p>High conversion chat + booking</p>
    </div>

    <div class="agent" onclick="switchAgent('support')">
      <b>Support Agent</b>
      <p>Customer help automation</p>
    </div>

    <div class="agent" onclick="switchAgent('closer')">
      <b>Closer AI</b>
      <p>Handles objections + pricing</p>
    </div>
  </aside>

  <main class="chat-wrap">

    <div class="chat" id="chat"></div>

    <div class="input-bar">
      <input id="input" placeholder="Ask your AI sales assistant..." />
      <button onclick="send()">Send</button>
    </div>

  </main>

</div>

<!-- FLOATING WIDGET -->
<div class="fab" onclick="toggleWidget()">AI</div>

<div class="widget" id="widget">
  <div class="chat" id="widgetChat"></div>

  <div class="input-bar">
    <input id="widgetInput" placeholder="Chat..." />
    <button onclick="sendWidget()">→</button>
  </div>
</div>

<script>

const API = "/api/chat";

let agent = "sales";

/* MAIN CHAT */
const chat = document.getElementById("chat");
const input = document.getElementById("input");

/* WIDGET CHAT */
const widget = document.getElementById("widget");
const widgetChat = document.getElementById("widgetChat");
const widgetInput = document.getElementById("widgetInput");

function add(el,text,type){
  const d=document.createElement("div");
  d.className=`msg ${type}`;
  d.textContent=text;
  el.appendChild(d);
  el.scrollTop=el.scrollHeight;
}

/* INIT */
add(chat,"AI Sales Engine online.","ai");

/* SEND */
async function send(){
  const text=input.value.trim();
  if(!text) return;

  add(chat,text,"user");
  input.value="";

  const res=await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({message:text,agent})
  });

  const data=await res.json();
  add(chat,data.reply || "No response","ai");
}

/* WIDGET */
function toggleWidget(){
  widget.classList.toggle("open");
}

async function sendWidget(){
  const text=widgetInput.value.trim();
  if(!text) return;

  add(widgetChat,text,"user");
  widgetInput.value="";

  const res=await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({message:text,agent:"sales"})
  });

  const data=await res.json();
  add(widgetChat,data.reply || "No response","ai");
}

/* AGENTS */
function switchAgent(a){
  agent=a;
  add(chat,`Switched to ${a.toUpperCase()} agent`,"ai");
}

/* ENTER */
input.addEventListener("keydown",e=>{if(e.key==="Enter")send()});
widgetInput.addEventListener("keydown",e=>{if(e.key==="Enter")sendWidget()});

</script>

</body>
</html>
