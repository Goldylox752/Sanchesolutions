<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SancheSolutions · Dashboard</title>

<style>
:root{
  --bg:#060914;
  --panel:#0c1328;
  --border:rgba(255,255,255,0.08);
  --accent:#38f2a5;
  --text:#eaf2ff;
  --danger:#ff4d4d;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  color:var(--text);
}

/* TOP BAR */
header{
  padding:14px 16px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  font-size:15px;
}

.badge{
  font-size:12px;
  padding:6px 10px;
  border-radius:20px;
  background:rgba(56,242,165,0.12);
  color:var(--accent);
}

.locked{
  background:rgba(255,77,77,0.12);
  color:var(--danger);
}

/* CHAT */
.chat{
  flex:1;
  overflow-y:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:12px 14px;
  border-radius:12px;
  font-size:14px;
  white-space:pre-wrap;
}

.user{
  background:var(--accent);
  color:#000;
  align-self:flex-end;
}

.ai{
  background:var(--panel);
  border:1px solid var(--border);
  align-self:flex-start;
}

/* INPUT */
.input-bar{
  display:flex;
  gap:10px;
  padding:12px;
  background:var(--panel);
  border-top:1px solid var(--border);
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:white;
  outline:none;
}

button{
  padding:12px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

.send{
  background:var(--accent);
  color:#000;
}

.upgrade{
  background:var(--danger);
  color:white;
}
</style>
</head>

<body>

<header>
  <h1>SancheSolutions · Control Dashboard</h1>
  <div id="status" class="badge locked">Checking plan...</div>
</header>

<div class="chat" id="chat"></div>

<div class="input-bar">
  <input id="input" placeholder="Ask your AI system..." />
  <button class="send" onclick="send()">Send</button>
  <button class="upgrade" onclick="goStripe()">Upgrade</button>
</div>

<script>

/* CONFIG */
const API_URL =
  window.location.hostname === "localhost"
    ? "http://localhost:3000"
    : "https://sanchesolutions.onrender.com";

const CHAT = `${API_URL}/api/chat`;
const STRIPE = `${API_URL}/api/create-checkout-session`;

const SESSION =
  localStorage.getItem("sessionId") || crypto.randomUUID();

localStorage.setItem("sessionId", SESSION);

/* STATE */
let plan = localStorage.getItem("plan") || "free";

/* UI */
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const status = document.getElementById("status");

function setStatus(text, locked=false){
  status.textContent = text;
  status.className = locked ? "badge locked" : "badge";
}

function addMsg(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* PLAN CHECK */
async function checkPlan(){
  try {
    await fetch(`${API_URL}/api/health`);

    if(plan === "pro"){
      setStatus("Pro Active", false);
      addMsg("Pro unlocked. Full system access enabled.", "ai");
    } else {
      setStatus("Free Plan", true);
      addMsg("Free plan detected. Upgrade to unlock automation features.", "ai");
    }

  } catch {
    setStatus("Offline", true);
  }
}

/* CHAT */
async function send(){

  const text = input.value.trim();
  if(!text) return;

  addMsg(text, "user");
  input.value = "";

  if(plan !== "pro"){
    addMsg("Upgrade required to use AI system.", "ai");
    return;
  }

  try {

    const res = await fetch(CHAT, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        message: text,
        sessionId: SESSION
      })
    });

    const data = await res.json();

    addMsg(data.reply || "No response", "ai");

  } catch {
    addMsg("Error connecting to backend.", "ai");
  }
}

/* STRIPE */
async function goStripe(){

  try {

    const res = await fetch(STRIPE, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        email: "test@test.com",
        user_id: SESSION
      })
    });

    const data = await res.json();

    if(data.url){
      localStorage.setItem("checkout_started", "true");
      window.location.href = data.url;
    } else {
      addMsg("Stripe error: no checkout URL", "ai");
    }

  } catch {
    addMsg("Checkout failed", "ai");
  }
}

/* AUTO UPGRADE (TEMP) */
if(window.location.search.includes("success=1")){
  localStorage.setItem("plan", "pro");
  plan = "pro";
}

/* INIT */
window.onload = () => {
  addMsg("SancheSolutions Dashboard online.", "ai");
  checkPlan();
};

</script>

</body>
</html>
