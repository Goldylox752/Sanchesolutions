<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MacFlip AI • Pro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f14;
  --panel:#121a24;
  --border:rgba(255,255,255,.08);
  --text:#eaf1ff;
  --muted:#93a4b8;
  --accent:#00e5a0;
  --accent2:#00b6ff;
  --danger:#ff4d6d;
  --warn:#ffcc00;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}

body{
  background:radial-gradient(circle at top,#0f1620,#070a0f);
  color:var(--text);
  height:100vh;
  overflow:hidden;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  background:rgba(10,15,22,.7);
  backdrop-filter:blur(20px);
}

.logo{font-weight:800}

.badge{
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(0,229,160,.12);
  border:1px solid rgba(0,229,160,.25);
  color:var(--accent);
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:260px 1fr;
  height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar{
  border-right:1px solid var(--border);
  padding:16px;
  background:rgba(18,26,36,.4);
}

.btn{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.02);
  color:var(--text);
  cursor:pointer;
  text-align:left;
}

.btn.active{
  background:rgba(0,229,160,.1);
  border-color:rgba(0,229,160,.4);
}

/* MAIN */
.main{
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  border-bottom:1px solid var(--border);
}

.cta{
  padding:10px 14px;
  border-radius:10px;
  border:none;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:16px;
}

.stat{
  background:var(--panel);
  border:1px solid var(--border);
  padding:12px;
  border-radius:12px;
}

.stat h3{
  font-size:12px;
  color:var(--muted);
}

.stat b{
  font-size:20px;
}

/* DEALS */
.deals{
  flex:1;
  overflow:auto;
  padding:16px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;
}

/* CARD */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  transition:.2s;
}

.card:hover{
  transform:translateY(-3px);
  border-color:rgba(0,229,160,.25);
}

.meta{
  font-size:12px;
  color:var(--muted);
  margin:6px 0;
}

.profit{
  font-weight:800;
  margin:10px 0;
}

.good{color:var(--accent)}
.bad{color:var(--danger)}
.med{color:var(--warn)}

.small{
  font-size:11px;
  color:var(--muted);
}

/* ALERT BAR */
.alerts{
  padding:10px 16px;
  border-top:1px solid var(--border);
  background:rgba(255,255,255,.02);
  height:120px;
  overflow:auto;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<header>
  <div class="logo">MacFlip AI • Pro Dashboard</div>
  <div class="badge" id="status">INIT</div>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <button class="btn active" onclick="loadDeals()">🔥 Live Deals</button>
    <button class="btn" onclick="toggleAuto()">⚡ Auto Scan</button>
    <button class="btn" onclick="checkout()">💳 Upgrade</button>
    <button class="btn" onclick="logout()">🚪 Logout</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <div>Real-Time MacBook Arbitrage Engine</div>
      <button class="cta" onclick="loadDeals()">Scan Now</button>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat">
        <h3>Total Deals</h3>
        <b id="totalDeals">0</b>
      </div>
      <div class="stat">
        <h3>Avg Profit</h3>
        <b id="avgProfit">$0</b>
      </div>
      <div class="stat">
        <h3>Best Flip</h3>
        <b id="bestFlip">$0</b>
      </div>
    </div>

    <!-- DEALS -->
    <div class="deals" id="deals"></div>

    <!-- ALERT STREAM -->
    <div class="alerts" id="alerts">
      🔔 Alert stream initializing...
    </div>

  </main>

</div>

<script>

const API = "/api/deals";

const dealsEl = document.getElementById("deals");
const statusEl = document.getElementById("status");

let auto = false;
let interval;

/* LOAD DEALS */
async function loadDeals(){

  const token = localStorage.getItem("sb_token");

  if(!token){
    statusEl.textContent = "LOGIN REQUIRED";
    return;
  }

  statusEl.textContent = "SCANNING...";

  const res = await fetch(API,{
    headers:{ Authorization:`Bearer ${token}` }
  });

  if(res.status === 403){
    statusEl.textContent = "PRO REQUIRED";
    return;
  }

  const data = await res.json();
  const deals = data.deals || [];

  render(deals);
  updateStats(deals);

  statusEl.textContent = "LIVE";
  pushAlert("Scan completed • " + deals.length + " listings found");
}

/* RENDER */
function render(deals){
  dealsEl.innerHTML="";

  deals.forEach(d=>{

    let level = d.profit > 120 ? "good" : d.profit > 70 ? "med" : "bad";

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div><b>${d.title}</b></div>
      <div class="meta">Buy: $${d.buy} • Resale: $${d.resale}</div>

      <div class="profit ${level}">
        Profit: $${d.profit}
      </div>

      <div class="small">${level.toUpperCase()} CONFIDENCE FLIP</div>

      <a href="${d.url}" target="_blank">Open Listing →</a>
    `;

    dealsEl.appendChild(div);
  });
}

/* STATS */
function updateStats(deals){

  const total = deals.length;
  const avg = deals.reduce((a,b)=>a+(b.profit||0),0)/total || 0;
  const best = Math.max(...deals.map(d=>d.profit||0));

  document.getElementById("totalDeals").innerText = total;
  document.getElementById("avgProfit").innerText = "$" + avg.toFixed(0);
  document.getElementById("bestFlip").innerText = "$" + (best || 0);
}

/* ALERTS */
function pushAlert(text){
  const el=document.getElementById("alerts");
  const time=new Date().toLocaleTimeString();

  el.innerHTML = `🔔 [${time}] ${text}<br>` + el.innerHTML;
}

/* AUTO SCAN */
function toggleAuto(){

  auto=!auto;

  if(auto){
    pushAlert("Auto Scan ENABLED");
    interval=setInterval(loadDeals,15000);
  }else{
    pushAlert("Auto Scan DISABLED");
    clearInterval(interval);
  }
}

/* STRIPE */
async function checkout(){
  const res=await fetch("/api/checkout",{method:"POST"});
  const data=await res.json();
  if(data.url) window.location.href=data.url;
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("sb_token");
  location.reload();
}

/* INIT */
loadDeals();

</script>

</body>
</html>
