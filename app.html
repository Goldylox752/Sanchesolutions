<script>

/* ─────────────────────────────
   CONFIG
───────────────────────────── */

/* LOCAL DEV + PRODUCTION AUTO SWITCH */
const API_URL =
  window.location.hostname === "localhost"
    ? "http://localhost:5000"
    : "https://YOURBACKEND.onrender.com";

/* API ROUTES */
const CHAT_ENDPOINT = `${API_URL}/api/chat`;
const HEALTH_ENDPOINT = `${API_URL}/api/health`;

/* SESSION */
const sessionId =
  localStorage.getItem("sanche_session") ||
  crypto.randomUUID();

localStorage.setItem(
  "sanche_session",
  sessionId
);

/* ─────────────────────────────
   STATE
───────────────────────────── */

let isLoading = false;

/* ─────────────────────────────
   ELEMENTS
───────────────────────────── */

const chat = document.getElementById("chat");
const input = document.getElementById("input");

/* ─────────────────────────────
   UI HELPERS
───────────────────────────── */

function scrollBottom() {
  chat.scrollTop = chat.scrollHeight;
}

function addMsg(text, type = "bot") {

  const div = document.createElement("div");

  div.className = `msg ${type}`;

  div.textContent = text;

  chat.appendChild(div);

  scrollBottom();

  return div;
}

function addTyping() {
  return addMsg(
    "AI is thinking...",
    "bot typing"
  );
}

/* ─────────────────────────────
   API HEALTH CHECK
───────────────────────────── */

async function checkBackend() {

  try {

    const res = await fetch(
      HEALTH_ENDPOINT
    );

    if (!res.ok) {
      throw new Error();
    }

    console.log(
      "✅ Backend online"
    );

  } catch (err) {

    addMsg(
      "⚠️ Backend waking up... please wait a moment.",
      "bot"
    );

    console.error(err);
  }
}

/* ─────────────────────────────
   SEND MESSAGE
───────────────────────────── */

async function send() {

  if (isLoading) return;

  const text = input.value.trim();

  if (!text) return;

  /* USER MESSAGE */

  addMsg(text, "user");

  input.value = "";

  input.focus();

  isLoading = true;

  const loading = addTyping();

  try {

    const controller =
      new AbortController();

    const timeout = setTimeout(() => {
      controller.abort();
    }, 45000);

    const res = await fetch(
      CHAT_ENDPOINT,
      {
        method: "POST",

        headers: {
          "Content-Type":
            "application/json"
        },

        body: JSON.stringify({
          message: text,
          sessionId
        }),

        signal: controller.signal
      }
    );

    clearTimeout(timeout);

    if (!res.ok) {

      const errorText =
        await res.text();

      throw new Error(
        errorText ||
        `HTTP ${res.status}`
      );
    }

    const data = await res.json();

    console.log(data);

    loading.textContent =
      data.reply ||
      data.message ||
      "No AI response received.";

  } catch (err) {

    console.error(err);

    if (err.name === "AbortError") {

      loading.textContent =
        "⏳ Request timed out. Backend may be waking up.";

    } else {

      loading.textContent =
        "⚠️ Failed to connect to AI server.";
    }

  } finally {

    isLoading = false;
  }
}

/* ─────────────────────────────
   ENTER KEY SUPPORT
───────────────────────────── */

input.addEventListener(
  "keydown",
  (e) => {

    if (e.key === "Enter") {
      e.preventDefault();
      send();
    }
  }
);

/* ─────────────────────────────
   VOICE INPUT
───────────────────────────── */

function startVoice() {

  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if (!SpeechRecognition) {

    addMsg(
      "⚠️ Voice recognition not supported.",
      "bot"
    );

    return;
  }

  const recognition =
    new SpeechRecognition();

  recognition.lang = "en-US";

  recognition.interimResults = false;

  recognition.maxAlternatives = 1;

  recognition.onstart = () => {

    addMsg(
      "🎤 Listening...",
      "bot"
    );
  };

  recognition.onresult = (event) => {

    const text =
      event.results[0][0]
        .transcript;

    input.value = text;

    send();
  };

  recognition.onerror = (
    event
  ) => {

    console.error(event);

    addMsg(
      "⚠️ Voice input failed.",
      "bot"
    );
  };

  recognition.start();
}

/* ─────────────────────────────
   INIT
───────────────────────────── */

window.onload = async () => {

  addMsg(
    "👋 SancheAI VoiceOS online.",
    "bot"
  );

  input.focus();

  await checkBackend();
};

</script>
