<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SancheAI · VoiceOS</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050816;
  --card:rgba(255,255,255,0.05);
  --card2:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.08);
  --blue:#4f8cff;
  --green:#34d399;
  --text:#edf2ff;
  --muted:#9aa7c7;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'DM Sans',sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  color:var(--text);
  background: radial-gradient(circle at top left,#10224d,#050816 60%);
}

/* APP */
.app{ display:flex; height:100vh; }

/* SIDEBAR */
.sidebar{
  width:280px;
  background:rgba(7,10,20,0.96);
  border-right:1px solid var(--border);
  padding:24px;
  display:flex;
  flex-direction:column;
}

.logo{ font-size:24px; font-weight:800; margin-bottom:28px; }
.logo span{ color:var(--blue); }

.menu{ display:flex; flex-direction:column; gap:12px; }

.menu button{
  background:transparent;
  border:none;
  color:white;
  text-align:left;
  padding:14px;
  border-radius:14px;
  cursor:pointer;
}

.menu button:hover{ background:var(--card); }

.active{
  background:rgba(79,140,255,0.15)!important;
  border:1px solid rgba(79,140,255,0.25);
}

.system{
  margin-top:auto;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
}

.live{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }

.dot{
  width:10px; height:10px; border-radius:50%;
  background:var(--green);
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:1;} 50%{opacity:0.4;} 100%{opacity:1;}
}

.metric{ margin-top:10px; color:var(--muted); font-size:13px; }

/* MAIN */
.main{ flex:1; display:flex; flex-direction:column; }

.header{
  height:72px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 24px;
  backdrop-filter:blur(10px);
}

.actions{ display:flex; gap:12px; }

.btn{
  border:none;
  border-radius:12px;
  padding:12px 16px;
  cursor:pointer;
  font-weight:700;
}

.primary{ background:var(--blue); color:white; }
.secondary{ background:var(--card); border:1px solid var(--border); color:white; }

/* CONTENT */
.content{
  flex:1;
  display:grid;
  grid-template-columns:350px 1fr;
  overflow:hidden;
}

/* PANEL */
.panel{
  border-right:1px solid var(--border);
  padding:22px;
  overflow-y:auto;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
  margin-bottom:18px;
}

.card-title{ color:var(--muted); font-size:13px; margin-bottom:14px; }

.big{ font-size:36px; font-weight:800; }

.agent{
  display:flex;
  justify-content:space-between;
  background:var(--card2);
  padding:14px;
  border-radius:14px;
  margin-top:12px;
}

.status{ color:var(--green); font-size:12px; }

/* CHAT */
.chat{ display:flex; flex-direction:column; height:100%; }

.messages{
  flex:1;
  overflow-y:auto;
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.msg{
  max-width:75%;
  padding:14px 16px;
  border-radius:18px;
  font-size:14px;
  line-height:1.5;
}

.user{ background:var(--blue); margin-left:auto; }

.bot{
  background:var(--card);
  border:1px solid var(--border);
}

.typing{
  opacity:0.7;
  font-style:italic;
}

/* INPUT */
.input-bar{
  border-top:1px solid var(--border);
  padding:18px;
  display:flex;
  gap:12px;
}

input{
  flex:1;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  color:white;
  outline:none;
}

.send{
  width:100px;
  border:none;
  border-radius:14px;
  background:var(--blue);
  color:white;
  font-weight:700;
  cursor:pointer;
}

.voice{
  width:60px;
  border:none;
  border-radius:14px;
  background:var(--green);
  cursor:pointer;
}

/* MOBILE */
@media(max-width:900px){
  .sidebar{ display:none; }
  .content{ grid-template-columns:1fr; }
  .panel{ display:none; }
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">Sanche<span>AI</span></div>

  <div class="menu">
    <button class="active">📞 AI Call Center</button>
    <button>🤖 AI Agents</button>
    <button>💬 Conversations</button>
    <button>📈 Pipeline</button>
    <button>🧠 Analytics</button>
  </div>

  <div class="system">
    <div class="live">
      <div class="dot"></div>
      <div>Groq AI Online</div>
    </div>
    <div class="metric">Active Calls: 12</div>
    <div class="metric">Agents: 5</div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">

<header class="header">
  <h3>AI VoiceOS</h3>

  <div class="actions">
    <button class="btn secondary">Dashboard</button>
    <button class="btn primary">Launch</button>
  </div>
</header>

<div class="content">

<!-- PANEL -->
<div class="panel">
  <div class="card">
    <div class="card-title">Performance</div>
    <div class="big">97%</div>
  </div>
</div>

<!-- CHAT -->
<div class="chat">

<div class="messages" id="messages"></div>

<div class="input-bar">
  <button class="voice" onclick="startVoice()">🎤</button>
  <input id="input" placeholder="Talk to AI..." />
  <button class="send" onclick="send()">Send</button>
</div>

</div>

</div>
</main>
</div>

<script>

/* 🔥 CONFIG */
const API_URL = "https://YOUR-BACKEND.onrender.com/chat";

/* ELEMENTS */
const messages = document.getElementById("messages");
const input = document.getElementById("input");

/* STATE */
let isLoading = false;

/* UI */
function addMsg(text,type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function addTyping(){
  return addMsg("AI is thinking...","bot typing");
}

/* SEND */
async function send(){

  if(isLoading) return;

  const text = input.value.trim();
  if(!text) return;

  addMsg(text,"user");
  input.value = "";

  isLoading = true;

  const bot = addTyping();

  try{

    const res = await fetch(API_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ message:text })
    });

    const data = await res.json();

    bot.textContent =
      data.reply || "No response from AI.";

  }catch(err){

    bot.textContent = "Backend connection failed.";

  }

  isLoading = false;
}

/* ENTER */
input.addEventListener("keypress",(e)=>{
  if(e.key==="Enter") send();
});

/* VOICE */
function startVoice(){

  const Speech =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if(!Speech) return alert("No voice support");

  const recog = new Speech();
  recog.lang = "en-US";
  recog.start();

  recog.onresult = (e)=>{
    input.value = e.results[0][0].transcript;
    send();
  };

}

/* INIT */
window.onload = ()=>{
  addMsg("👋 VoiceOS ready. Talk or type.","bot");
};

</script>

</body>
</html>
