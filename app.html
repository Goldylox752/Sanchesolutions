<script>
const API_URL =
  window.location.hostname === "localhost"
    ? "http://localhost:5000"
    : "https://sanchesolutions.onrender.com";

const CHAT_ENDPOINT = `${API_URL}/api/chat`;
const HEALTH_ENDPOINT = `${API_URL}/api/health`;

const sessionId = localStorage.getItem("sessionId") || crypto.randomUUID();
localStorage.setItem("sessionId", sessionId);

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  const loading = addMsg("Thinking...", "bot");

  try {
    const res = await fetch(CHAT_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, sessionId })
    });

    const data = await res.json();

    loading.textContent =
      data.reply || data.message || "No response";

  } catch (err) {
    loading.textContent = "Error connecting to server";
  }
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

async function checkBackend() {
  try {
    await fetch(HEALTH_ENDPOINT);
    console.log("Backend OK");
  } catch {
    addMsg("Backend starting...", "bot");
  }
}

/* Voice (optional) */
function startVoice() {
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    addMsg("Voice not supported", "bot");
    return;
  }

  const rec = new SpeechRecognition();
  rec.lang = "en-US";

  rec.onresult = (e) => {
    input.value = e.results[0][0].transcript;
    send();
  };

  rec.start();
}

window.onload = () => {
  addMsg("AI Ready", "bot");
  input.focus();
  checkBackend();
};
</script>
