<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>SancheAI · VoiceOS</title>

<style>
:root{
  --bg:#050816;
  --card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);
  --blue:#4f8cff;
  --green:#34d399;
  --text:#edf2ff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  padding:14px;
  text-align:center;
  background:#0b1224;
  font-weight:700;
  border-bottom:1px solid var(--border);
}

/* CHAT */
.chat{
  flex:1;
  overflow-y:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:75%;
  padding:12px 14px;
  border-radius:14px;
  font-size:14px;
  line-height:1.4;
}

.user{
  background:var(--blue);
  margin-left:auto;
}

.bot{
  background:var(--card);
  border:1px solid var(--border);
}

.typing{
  opacity:0.7;
  font-style:italic;
}

/* INPUT */
.input-bar{
  display:flex;
  gap:10px;
  padding:12px;
  border-top:1px solid var(--border);
  background:#0b1224;
}

input{
  flex:1;
  padding:14px;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.03);
  color:white;
}

button{
  border:none;
  border-radius:10px;
  padding:12px;
  cursor:pointer;
  font-weight:700;
}

.send{
  background:var(--blue);
  color:white;
}

.voice{
  background:var(--green);
  color:black;
}
</style>
</head>

<body>

<header>SancheAI VoiceOS</header>

<div class="chat" id="chat"></div>

<div class="input-bar">
  <button class="voice" onclick="startVoice()">🎤</button>
  <input id="input" placeholder="Talk to AI..." />
  <button class="send" onclick="send()">Send</button>
</div>

<script>

/* ─────────────────────────────
   CONFIG
───────────────────────────── */

const API_URL = "https://YOUR-BACKEND.onrender.com/chat";

/* stable session (SaaS ready) */
const session =
  localStorage.getItem("session") ||
  crypto.randomUUID();

localStorage.setItem("session", session);

/* ─────────────────────────────
   STATE CONTROL
───────────────────────────── */

let isLoading = false;

/* ─────────────────────────────
   UI HELPERS
───────────────────────────── */

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function scrollBottom(){
  chat.scrollTop = chat.scrollHeight;
}

function addMsg(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  chat.appendChild(div);
  scrollBottom();
  return div;
}

function addTyping(){
  return addMsg("AI is thinking...","bot typing");
}

/* ─────────────────────────────
   SEND MESSAGE
───────────────────────────── */

async function send(){

  if(isLoading) return;

  const text = input.value.trim();
  if(!text) return;

  addMsg(text,"user");
  input.value = "";

  isLoading = true;

  const loading = addTyping();

  try{

    const res = await fetch(API_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message:text,
        sessionId:session
      })
    });

    if(!res.ok){
      throw new Error("Network error");
    }

    const data = await res.json();

    loading.textContent =
      data.reply || "No response from AI.";

  }catch(err){

    console.error(err);

    loading.textContent =
      "⚠️ Connection failed. Backend offline.";

  }finally{
    isLoading = false;
  }
}

/* ─────────────────────────────
   ENTER KEY SUPPORT
───────────────────────────── */

input.addEventListener("keypress",(e)=>{
  if(e.key === "Enter"){
    send();
  }
});

/* ─────────────────────────────
   VOICE INPUT
───────────────────────────── */

function startVoice(){

  const Speech =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if(!Speech){
    alert("Voice not supported in this browser");
    return;
  }

  const rec = new Speech();
  rec.lang = "en-US";

  rec.onstart = () => {
    addMsg("🎤 Listening...","bot");
  };

  rec.onresult = (e)=>{
    const text = e.results[0][0].transcript;
    input.value = text;
    send();
  };

  rec.onerror = () => {
    addMsg("Voice error occurred","bot");
  };

  rec.start();
}

/* ─────────────────────────────
   INIT
───────────────────────────── */

window.onload = () => {
  addMsg("👋 VoiceOS ready. Ask anything.","bot");
};

</script>

</body>
</html>
